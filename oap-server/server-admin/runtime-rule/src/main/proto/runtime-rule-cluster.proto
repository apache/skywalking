syntax = "proto3";

package skywalking.v3.runtime_rule;

option java_multiple_files = true;
option java_package = "org.apache.skywalking.oap.server.receiver.runtimerule.cluster.v1";

// Cluster-internal RPCs used during a structural runtime-rule update. All admin writes for
// a given runtime-rule cluster are serialized on a single "main" OAP — the sorted-first peer
// by address (deterministic, no leader election). Non-main nodes that receive an HTTP write
// forward it to the main via Forward (below). The main broadcasts Suspend to every peer so
// they stop running the old bundle while the main applies DDL and verifies it. On success
// the main persists the new row; peers converge on the next refresh tick (see
// `receiver-runtime-rule.refreshRulesPeriod`, default 30 s). On failure (compile, verify,
// persist) the main broadcasts Resume so peers flip back to RUNNING within an RPC round-trip
// instead of waiting the 60 s self-heal window.
//
// Travels on the admin-internal gRPC bus owned by `admin-server` (default port 17129), NOT
// on the public agent / cluster gRPC port (`core.gRPCPort`, default 11800). Privileged admin
// RPCs stay isolated from the agent network's blast radius.
//
// Self-heal on the periodic refresh tick is the backstop for the narrow case where the main
// crashes after Suspend but before Resume — peers whose SUSPENDED state has been held by a
// peer origin past `selfHealThresholdSeconds` (default 60 s) and whose DB content has not
// advanced flip themselves back to RUNNING on the retained old bundle.
service RuntimeRuleClusterService {
    rpc Suspend(SuspendRequest) returns (SuspendAck);
    rpc Resume(ResumeRequest) returns (ResumeAck);
    // Forward a write request to the cluster's main OAP. Any node that receives an
    // /addOrUpdate / /inactivate / /delete HTTP request when it isn't the main wraps the
    // HTTP intent in a ForwardRequest and calls this RPC against the main's admin-internal
    // channel. The main runs the full local workflow and returns the HTTP status + JSON
    // body in the ack. Eliminates the "client must resubmit" round-trip from the old
    // 421 Misdirected Request behaviour.
    rpc Forward(ForwardRequest) returns (ForwardResponse);
    // Query the apply-status the main tracks for a runtime-rule file. Read-only; served by the
    // main (non-main nodes route here, since only the main runs applies and holds the status).
    // Lets the UI/operator poll an apply's progress, and — after the ephemeral apply_id is gone
    // (page refresh / main restart) — ask by (catalog, name[, content_hash]), the durable identity.
    rpc GetApplyStatus(ApplyStatusRequest) returns (ApplyStatusResponse);
    // Fired by the main right after it commits a structural apply, so peers converge NOW
    // (run a reconcile against the just-persisted DB row) instead of waiting up to one refresh
    // tick (~30s). Best-effort: the ack only confirms the peer accepted the nudge; the peer
    // still self-converges on its next tick if the notify is lost.
    rpc NotifyApplied(NotifyAppliedRequest) returns (NotifyAppliedAck);
}

message SuspendRequest {
    // otel-rules | log-mal-rules | lal
    string catalog = 1;
    // relative path under the catalog root, no extension, may contain '/'
    string name = 2;
    // informational; logged on the receiver for diagnostic trails
    string reason = 3;
    // main node's instance id — receivers compare against their own id to suppress any
    // accidental self-broadcast loops that would otherwise drain the local bundle twice
    string sender_node_id = 4;
    // epoch millis on the main node. Not used for causality decisions (self-heal uses
    // monotonic clock on the receiver) but useful for latency diagnostics in logs.
    int64 issued_at_ms = 5;
}

message SuspendAck {
    string node_id = 1;
    SuspendState state = 2;
    // human-readable audit trail (e.g. "drained 7 metric classes, 2 lal rules")
    string detail = 3;
}

enum SuspendState {
    SUSPEND_STATE_UNSPECIFIED = 0;
    // was ACTIVE on this node, now suspended — new response for this tick
    SUSPENDED = 1;
    // idempotent replay of a Suspend the receiver has already honored — no state change
    ALREADY_SUSPENDED = 2;
    // bundle not present locally; main node proceeds, nothing to drain here
    NOT_PRESENT = 3;
    // receiver refused because of an origin conflict (this node is itself mid-apply as
    // SELF origin, meaning two OAPs believe they're main for this file — routing failure
    // or split-brain). `detail` carries the diagnostic message.
    REJECTED = 4;
}

// Resume is the inverse of Suspend. Sent by the main node right after a local apply failure
// (compile / verify / persist) so peers flip back to RUNNING without waiting for the 60 s
// self-heal threshold. Clears only the PEER origin on the receiver — a receiver that happens
// to be SELF-suspended for its own in-flight apply ignores Resume for the SELF bit.
message ResumeRequest {
    string catalog = 1;
    string name = 2;
    string reason = 3;
    string sender_node_id = 4;
    int64 issued_at_ms = 5;
}

message ResumeAck {
    string node_id = 1;
    ResumeState state = 2;
    string detail = 3;
}

enum ResumeState {
    RESUME_STATE_UNSPECIFIED = 0;
    // bundle transitioned SUSPENDED → RUNNING (PEER origin cleared; no other origin held)
    RESUMED = 1;
    // PEER origin was not set on this node (never received Suspend, or already cleared by
    // self-heal, or another Resume replay). Idempotent, no state change.
    NOT_SUSPENDED_BY_SENDER = 2;
    // bundle not present locally — nothing to flip
    RESUME_NOT_PRESENT = 3;
    // PEER cleared but SELF is still set (rare BOTH state); bundle stays SUSPENDED until
    // local apply finishes. `detail` describes the BOTH situation for audit.
    PARTIALLY_RESUMED = 4;
}

// ForwardRequest wraps an incoming HTTP write request so the receiving (non-main) node can
// hand the work off to the cluster's main. Receiver runs the operation as if it received the
// HTTP directly, then packages the HTTP response into ForwardResponse. Two operator-visible
// behaviours:
//
//   1. Normal case: non-main wraps + forwards; main runs the workflow; operator sees the
//      main's response transparently without having to resubmit.
//   2. Routing-misfire fail-safe: if the receiver of a ForwardRequest ALSO isn't the main
//      (its own cluster view disagrees with the sender's), it does NOT re-forward —
//      responds with http_status=421 and a diagnostic body. This bounds cluster ping-pong
//      at one hop and signals an operator that two nodes disagree about cluster membership.
message ForwardRequest {
    // "addOrUpdate" | "inactivate" | "delete"
    string operation = 1;
    string catalog = 2;
    string name = 3;
    // Raw HTTP body — the rule YAML bytes for addOrUpdate; empty for inactivate / delete.
    // Bytes not string so a binary-safe round-trip is guaranteed even though YAML is UTF-8
    // text in practice.
    bytes body = 4;
    // Maps to the /addOrUpdate?allowStorageChange= query param; ignored for inactivate /
    // delete.
    bool allow_storage_change = 5;
    // Maps to the /addOrUpdate?force= query param. True for recovery pushes — forces the
    // bypass of the byte-identical no-change short-circuit so a same-content re-push drives
    // the full pipeline. Ignored for inactivate / delete.
    bool force_reapply = 6;
    // Sender's instance id. Receivers log it for diagnostic trails; the fail-safe also uses
    // it to spot pathological self-forward loops before they cause damage.
    string sender_node_id = 7;
    // Epoch millis on the forwarding node. Diagnostic only; not used for causality.
    int64 issued_at_ms = 8;
}

message ForwardResponse {
    // Mirror of the HTTP status the main's REST handler would have returned (200, 400,
    // 409, 421, 500, etc.). Forwarder relays this verbatim to the original HTTP caller.
    int32 http_status = 1;
    // Mirror of the HTTP response body (JSON) the main would have returned.
    string body = 2;
    // Instance id of the node that actually produced the response — normally the main,
    // but on the fail-safe path (receiver also isn't main) it's still the receiver so the
    // operator can correlate which node refused.
    string node_id = 3;
}

// Identifies the apply whose status the caller wants. Either apply_id (the live handle a
// just-submitted apply was given) OR catalog+name (+ optional content_hash) — the content-based
// path used once the apply_id is gone. content_hash, when set, requires the latest tracked apply
// for that file to match (else found=false), so a stale query doesn't misreport a newer apply.
message ApplyStatusRequest {
    string apply_id = 1;
    string catalog = 2;
    string name = 3;
    string content_hash = 4;
}

// Lifecycle phase of an apply on the main. Mirrors the Java ApplyPhase; prefixed to avoid
// collision with the other enums in this package.
enum ApplyStatusPhase {
    APPLY_PHASE_UNSPECIFIED = 0;
    APPLY_PHASE_PENDING = 1;
    // 2 (VALIDATING) was removed: it is a sub-step inside the single compile/verify/schema-change
    // call and is not separately observable by the main's orchestration. Reserved to keep the wire
    // number stable.
    reserved 2;
    reserved "APPLY_PHASE_VALIDATING";
    APPLY_PHASE_DDL = 3;
    // After persist, the main waits (in the background, on a generous timeout) for every data node
    // to apply the new schema revision BEFORE resuming dispatch — an un-propagated write is dropped.
    // The HTTP response returns here with the apply_id; dispatch stays suspended through FENCING.
    APPLY_PHASE_FENCING = 4;
    // Fence confirmed — finalize the local commit, unpark dispatch, resume/notify peers.
    APPLY_PHASE_ROLLING_OUT = 5;
    APPLY_PHASE_APPLIED = 6;
    APPLY_PHASE_DEGRADED = 7;
    APPLY_PHASE_FAILED = 8;
    // The main no longer holds an apply matching the request (evicted / main restarted, or the
    // content_hash did not match the latest tracked apply). Caller falls back to a content-hash
    // comparison against the durable DAO row.
    APPLY_PHASE_UNKNOWN = 9;
}

message ApplyStatusResponse {
    // False when no matching apply is tracked (phase is then APPLY_PHASE_UNKNOWN and the rest
    // are empty/zero). True otherwise, with the fields below populated.
    bool found = 1;
    string apply_id = 2;
    string catalog = 3;
    string name = 4;
    string content_hash = 5;
    ApplyStatusPhase phase = 6;
    // Non-empty only for APPLY_PHASE_FAILED / APPLY_PHASE_DEGRADED.
    string failure_reason = 7;
    int64 started_at_ms = 8;
    int64 updated_at_ms = 9;
    // Instance id of the node that produced this status (the main).
    string node_id = 10;
    // Data-node ids that had not confirmed the schema revision when the fence timed out.
    // Non-empty only on APPLY_PHASE_DEGRADED (fence non-confirmation).
    repeated string fence_laggards = 11;
}

// Sent by the main after a successful structural commit so peers reconcile immediately.
message NotifyAppliedRequest {
    string catalog = 1;
    string name = 2;
    // The committed content hash — informational/correlation; the peer reconciles from the DB row.
    string content_hash = 3;
    // Main's instance id; receivers compare against their own to suppress self-broadcast loops.
    string sender_node_id = 4;
    // Epoch millis on the main; diagnostic only.
    int64 issued_at_ms = 5;
}

message NotifyAppliedAck {
    string node_id = 1;
    // True when the peer scheduled an immediate reconcile; false on self-broadcast suppression
    // or when the receiver isn't ready (it still self-converges on its next tick).
    bool accepted = 2;
    string detail = 3;
}
