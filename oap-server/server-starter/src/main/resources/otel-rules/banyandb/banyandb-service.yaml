# SWIP-15: BanyanDB self-observability, Service scope = one BanyanDB cluster.
# The FODC proxy is the single scrape target; the collector injects one static label
# `cluster` (the only label SkyWalking must add). Every BanyanDB-native family carries
# the `banyandb_` prefix; only the Go-runtime / process exporter families (go_* / process_*)
# are bare. All cluster KPIs collapse to the single `cluster` series via `.sum(['cluster'])`,
# which is also what makes the heterogeneous error families joinable by MAL `+`
# (MAL arithmetic inner-joins on exact label equality).
# Source expressions mirror the upstream BanyanDB Grafana boards
# (docs/operation/grafana-fodc-workload.json) so the SkyWalking dashboards stay in lockstep.
filter: "{ tags -> tags.job_name == 'banyandb-monitoring' }"
expSuffix: service(['cluster'], Layer.BANYANDB)
metricPrefix: meter_banyandb
metricsRules:
  # cluster writes/s across the three data-model scopes (measure, stream, trace). Each scope's
  # write counter is collapsed to one per-cluster series before `+`.
  - name: cluster_write_rate
    exp: (banyandb_measure_total_written.sum(['cluster']).rate('PT1M') + banyandb_stream_tst_total_written.sum(['cluster']).rate('PT1M') + banyandb_trace_tst_total_written.sum(['cluster']).rate('PT1M'))
  # cluster queries/s. `service` on this family is BanyanDB's data-model facet
  # (measure/stream/trace/property), not a SkyWalking service; method literal is "query".
  - name: cluster_query_rate
    exp: banyandb_liaison_grpc_total_started.tagEqual('method','query').sum(['cluster']).rate('PT1M')
  # cluster errors/min. The seven liaison-side error families mirror the upstream Grafana
  # "Error Rate" stat (grafana-fodc-workload.json). Each is pre-aggregated to ['cluster']
  # BEFORE `+` because their wire label sets differ (stream_msg_received_err carries
  # group/method/service, registry_err carries method/service, sync_loop_err carries group)
  # and MAL `+` joins on exact label equality. On a healthy cluster most of these are lazily
  # registered and emit no series; MAL treats an empty operand as the additive identity, so the
  # sum emits from whatever has fired and renders absent-as-0 when nothing has.
  - name: cluster_error_rate
    exp: (banyandb_liaison_grpc_total_err.sum(['cluster']).rate('PT1M') + banyandb_liaison_grpc_total_registry_err.sum(['cluster']).rate('PT1M') + banyandb_liaison_grpc_total_stream_msg_received_err.sum(['cluster']).rate('PT1M') + banyandb_queue_pub_total_err.sum(['cluster']).rate('PT1M') + banyandb_measure_total_sync_loop_err.sum(['cluster']).rate('PT1M') + banyandb_stream_tst_total_sync_loop_err.sum(['cluster']).rate('PT1M') + banyandb_trace_tst_total_sync_loop_err.sum(['cluster']).rate('PT1M')) * 60
  # live container count by role. count(['cluster','container_name','pod_name']) groups by all
  # three then re-groups excluding the last key (pod_name), yielding one sample per
  # (cluster, container_name) whose value = distinct pod_name count -> data=N, liaison=M.
  # Mirrors the upstream "Nodes by Role" stat (count(banyandb_system_up_time) by container_name).
  # CAVEAT: banyandb_system_up_time has NO lifecycle series (the lifecycle sidecar runs its
  # metric service without the system collector), so this never emits a lifecycle row.
  - name: reporting_instances
    exp: banyandb_system_up_time.count(['cluster','container_name','pod_name'])
  # cluster CPU capacity = sum of per-container visible core counts (no lifecycle series).
  - name: total_cpu_cores
    exp: banyandb_system_cpu_num.sum(['cluster'])
  # cluster memory used (bytes). kind='used' is a real wire value (kind in total/used/used_percent).
  - name: total_memory_used
    exp: banyandb_system_memory_state.tagEqual('kind','used').sum(['cluster'])
  # cluster disk used (bytes). system_disk carries a `path` label with multiple data roots;
  # .sum(['cluster']) collapses all paths into one cluster total.
  - name: total_disk_used
    exp: banyandb_system_disk.tagEqual('kind','used').sum(['cluster'])
