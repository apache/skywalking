# SWIP-15: BanyanDB self-observability, ServiceInstance scope = one container on a node.
# The instance identity is pod_name + container_name (a data hot/warm pod co-hosts a data and a
# lifecycle container under one pod_name), joined by '@'. role (container_name) and tier (node_type)
# ride as instance attributes via the 6-arg instance() properties closure; node_type Elvis-defaults
# to 'n/a' off data containers (it is absent on liaison samples, present on every ROLE_DATA sample).
#
# Every rule that aggregates keeps ['cluster','pod_name','container_name','node_role','node_type'] in
# its .sum()/.avg()/.max() group-by: SampleFamily.aggregate() drops labels not in the group-by, and
# the properties closure reads them from the post-aggregation sample (SampleFamily.java:810). node_type
# rides on every ROLE_DATA sample (system_*, go_*, process_* included), so a data instance resolves a
# stable tier across all rules; liaison families carry none, so liaison resolves 'n/a' consistently.
#
# Source expressions mirror the upstream BanyanDB Grafana "Nodes" board
# (docs/operation/grafana-fodc-nodes.json) plus the liaison/data rows of the "Workload" board, so the
# SkyWalking instance dashboard stays in lockstep with the upstream catalog.
#
# Rules are ROLE-SEPARATED by name prefix: the shared resource/runtime block stays unprefixed (one
# rule each, resolved on whatever container emits the family); front-door families carry a liaison_*
# prefix, storage/index families a data_* prefix, and the migration-sidecar health triple a lifecycle_*
# prefix. The scope is unchanged (a single instance() identity); the prefix is what lets the UI layer
# template select the panel set per role (container_name liaison/data/lifecycle) and what lets a human
# read a metric name and know which role it belongs to. Same wire family read under two prefixes
# (e.g. *_total_file_parts on liaison vs data) is disambiguated by container_name: each role rule reads
# only its own container's series, so liaison front-door buffers and data storage parts never mix.
filter: "{ tags -> tags.job_name == 'banyandb-monitoring' }"
expSuffix: |-
  service(['cluster'], Layer.BANYANDB)
  .instance(['cluster'], '::', ['container_name', 'pod_name'], '@', Layer.BANYANDB, { tags -> ['node_role': tags.node_role, 'node_type': tags.node_type ?: 'n/a', 'pod_name': tags.pod_name, 'container_name': tags.container_name] })
metricPrefix: meter_banyandb_instance
metricsRules:
  # ---- All roles: Resources / Disk by Path / Go Runtime (every container emits these) ----
  # These stay UNPREFIXED: the family is inherently per-instance, resolves on whatever container emits
  # it, and the absence on lifecycle (no system collector) is the correct N/A. No role filter needed.
  # node uptime (s). Raw gauge; ABSENT on lifecycle containers (their binary runs the metric service
  # without the system collector), so the lifecycle instance shows no uptime.
  - name: node_uptime
    exp: banyandb_system_up_time
  # CPU usage (cores). process_* rides on every container including lifecycle.
  - name: cpu_usage
    exp: process_cpu_seconds_total.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  # resident memory (bytes). Raw gauge, present on all containers.
  - name: rss_memory
    exp: process_resident_memory_bytes
  # system memory used %. kind='used_percent' is a 0-1 fraction (BanyanDB already divides by 100), so *100
  # back to a 0-100 percentage -- a bare fraction collapses to 0/1 in the integer meter-value store and
  # renders as 0%/100%.
  - name: system_memory_percent
    exp: banyandb_system_memory_state.tagEqual('kind','used_percent') * 100
  # disk used % -- use BanyanDB's own kind='used_percent' (gopsutil used/(used+free), a 0-1 fraction)
  # rather than recomputing used/total (which ignores reserved blocks and under-reports). The node's data
  # paths share one filesystem and report the same value, so avg() collapses them to one; *100 -> 0-100 %.
  - name: disk_usage_percent
    exp: banyandb_system_disk.tagEqual('kind','used_percent').avg(['cluster','pod_name','container_name','node_role','node_type']) * 100
  # disk used / total / used% broken out per mount path.
  - name: disk_used_by_path
    exp: banyandb_system_disk.tagEqual('kind','used').sum(['cluster','pod_name','container_name','node_role','node_type','path'])
  - name: disk_total_by_path
    exp: banyandb_system_disk.tagEqual('kind','total').sum(['cluster','pod_name','container_name','node_role','node_type','path'])
  - name: disk_used_percent_by_path
    exp: banyandb_system_disk.tagEqual('kind','used_percent').avg(['cluster','pod_name','container_name','node_role','node_type','path']) * 100
  # network throughput (bytes/s) by interface name.
  - name: network_recv
    exp: banyandb_system_net_state.tagEqual('kind','bytes_recv').sum(['cluster','pod_name','container_name','node_role','node_type','name']).rate('PT1M')
  - name: network_sent
    exp: banyandb_system_net_state.tagEqual('kind','bytes_sent').sum(['cluster','pod_name','container_name','node_role','node_type','name']).rate('PT1M')
  # Go runtime.
  - name: goroutines
    exp: go_goroutines
  # average GC pause (s) = rate(Σpause) / rate(Σcount). go_gc_duration_seconds is a summary (no buckets),
  # so this ratio of _sum/_count is the only valid average — do not apply histogram_percentile to it.
  - name: gc_pause_avg
    exp: go_gc_duration_seconds_sum.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M').safeDiv(go_gc_duration_seconds_count.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M'))
  - name: heap_inuse
    exp: go_memstats_heap_inuse_bytes
  - name: heap_next_gc
    exp: go_memstats_next_gc_bytes
  - name: alloc_rate
    exp: go_memstats_alloc_bytes_total.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')

  # ---- Liaison only (front door; the UI gates these on container_name == liaison) ----
  # query rate (req/s) by data-model service (measure/stream/trace/property). method literal is "query".
  - name: liaison_query_rate
    exp: banyandb_liaison_grpc_total_started.tagEqual('method','query').sum(['cluster','pod_name','container_name','node_role','node_type','service']).rate('PT1M')
  # gRPC errors/min. Three liaison-side error families (mirrors the Grafana "gRPC Error Rate" panel,
  # which sums total_err + registry_err + stream_msg_received_err). All lazily registered -> empty on a
  # healthy cluster; each pre-aggregated to the same label set before '+'.
  - name: liaison_grpc_error_rate
    exp: (banyandb_liaison_grpc_total_err.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_liaison_grpc_total_registry_err.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_liaison_grpc_total_stream_msg_received_err.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')) * 60
  # registry operation rate (req/s): schema registry ops on the liaison front door. total_started is
  # query-only on the wire, so the former tagNotEqual('method','query') term was empty and is dropped;
  # registry_started carries the non-query op count.
  - name: liaison_registry_op_rate
    exp: banyandb_liaison_grpc_total_registry_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  # write rate (writes/s) seen at the liaison front door. group label dropped (instance-level total).
  - name: liaison_write_rate
    exp: banyandb_measure_total_written.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_stream_tst_total_written.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_trace_tst_total_written.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  # tier-2 publish pipeline (liaison -> data): throughput by operation, bytes/s, and p99 send latency.
  - name: liaison_publish_throughput
    exp: banyandb_queue_pub_total_finished.sum(['cluster','pod_name','container_name','node_role','node_type','operation']).rate('PT1M')
  - name: liaison_publish_bytes
    exp: banyandb_queue_pub_sent_bytes.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  - name: liaison_publish_latency_p99
    exp: banyandb_queue_pub_total_latency.sum(['cluster','pod_name','container_name','node_role','node_type','operation','le']).histogram().histogram_percentile([99])
  # tier-2 publish, batch granularity (BanyanDB #1169): batches published/s by operation and the batch
  # send-latency p99. total_batch_latency uses a coarser bucket set than the per-operation total_latency.
  # BUILD-GATED: _batch_finished/_batch_latency are absent on current builds -> emit nothing until the
  # shipped BanyanDB build registers them.
  - name: liaison_publish_batch_throughput
    exp: banyandb_queue_pub_total_batch_finished.sum(['cluster','pod_name','container_name','node_role','node_type','operation']).rate('PT1M')
  - name: liaison_publish_batch_latency_p99
    exp: banyandb_queue_pub_total_batch_latency.sum(['cluster','pod_name','container_name','node_role','node_type','operation','le']).histogram().histogram_percentile([99])
  # liaison write-queue (wqueue) depth: pending records buffered at the front door before publish.
  # The same pending_data_count family on data containers reflects storage parts -> see data_wqueue_pending;
  # the role prefix + container_name gate keep the two meanings apart. Gauge, summed to the instance.
  - name: liaison_wqueue_pending
    exp: banyandb_measure_pending_data_count.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_stream_tst_pending_data_count.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_trace_tst_pending_data_count.sum(['cluster','pod_name','container_name','node_role','node_type'])

  # ---- Data only (backend; the UI gates these on container_name == data) ----
  # total stored data elements (gauge).
  - name: data_total_data
    exp: banyandb_measure_total_file_elements.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_stream_tst_total_file_elements.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_trace_tst_total_file_elements.sum(['cluster','pod_name','container_name','node_role','node_type'])
  # write-queue (wqueue) storage parts on the data node: on-disk file parts, in-memory parts, and pending
  # records. These are data-resident (file/mem parts are 0 on liaison), so they live only under data_*.
  - name: data_wqueue_file_parts
    exp: banyandb_measure_total_file_parts.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_stream_tst_total_file_parts.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_trace_tst_total_file_parts.sum(['cluster','pod_name','container_name','node_role','node_type'])
  - name: data_wqueue_mem_part
    exp: banyandb_measure_total_mem_part.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_stream_tst_total_mem_part.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_trace_tst_total_mem_part.sum(['cluster','pod_name','container_name','node_role','node_type'])
  - name: data_wqueue_pending
    exp: banyandb_measure_pending_data_count.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_stream_tst_pending_data_count.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_trace_tst_pending_data_count.sum(['cluster','pod_name','container_name','node_role','node_type'])
  # merge-loop iterations/s.
  - name: data_merge_file_rate
    exp: banyandb_measure_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_stream_tst_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_trace_tst_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  # avg parts merged per merge loop on the file path (matches Grafana = rate(merged_parts{type=file}) /
  # rate(merge_loop_started)). type='file' is data-only on the wire (liaison emits only type='mem').
  - name: data_merge_file_partitions
    exp: banyandb_measure_total_merged_parts.tagEqual('type','file').sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M').safeDiv(banyandb_measure_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')) + banyandb_stream_tst_total_merged_parts.tagEqual('type','file').sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M').safeDiv(banyandb_stream_tst_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')) + banyandb_trace_tst_total_merged_parts.tagEqual('type','file').sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M').safeDiv(banyandb_trace_tst_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M'))
  # avg file-merge latency (ms) per merge loop.
  - name: data_merge_file_latency
    exp: (banyandb_measure_total_merge_latency.tagEqual('type','file').sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M').safeDiv(banyandb_measure_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')) + banyandb_stream_tst_total_merge_latency.tagEqual('type','file').sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M').safeDiv(banyandb_stream_tst_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')) + banyandb_trace_tst_total_merge_latency.tagEqual('type','file').sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M').safeDiv(banyandb_trace_tst_total_merge_loop_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M'))) * 1000
  # inverted-index (series) write rate / term-search rate / total docs. *_inverted_index_total_* are
  # # TYPE=gauge but cumulative, so rate() yields a per-window delta. Stream's series index is the
  # storage scope (stream_storage_*); the tst scope is reported separately below. Trace's series index
  # (trace_storage_*) is included so trace series writes/docs are not silently dropped.
  - name: data_series_write_rate
    exp: banyandb_measure_inverted_index_total_updates.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_stream_storage_inverted_index_total_updates.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_trace_storage_inverted_index_total_updates.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  - name: data_series_term_search_rate
    exp: banyandb_measure_inverted_index_total_term_searchers_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_stream_storage_inverted_index_total_term_searchers_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M') + banyandb_trace_storage_inverted_index_total_term_searchers_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  - name: data_total_series
    exp: banyandb_measure_inverted_index_total_doc_count.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_stream_storage_inverted_index_total_doc_count.sum(['cluster','pod_name','container_name','node_role','node_type']) + banyandb_trace_storage_inverted_index_total_doc_count.sum(['cluster','pod_name','container_name','node_role','node_type'])
  # stream time-series-table (tst) index, distinct from the stream series (storage) index above.
  - name: data_stream_tst_write_rate
    exp: banyandb_stream_tst_inverted_index_total_updates.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  - name: data_stream_tst_term_search_rate
    exp: banyandb_stream_tst_inverted_index_total_term_searchers_started.sum(['cluster','pod_name','container_name','node_role','node_type']).rate('PT1M')
  - name: data_stream_tst_total_docs
    exp: banyandb_stream_tst_inverted_index_total_doc_count.sum(['cluster','pod_name','container_name','node_role','node_type'])
  # subscribe-side queue (data receives from liaison): throughput by operation + p99 latency.
  - name: data_queue_sub_throughput
    exp: banyandb_queue_sub_total_finished.sum(['cluster','pod_name','container_name','node_role','node_type','operation']).rate('PT1M')
  - name: data_queue_sub_latency_p99
    exp: banyandb_queue_sub_total_latency.sum(['cluster','pod_name','container_name','node_role','node_type','operation','le']).histogram().histogram_percentile([99])
  # subscribe-side per-message throughput (BanyanDB #1169). A data node ingests writes via the
  # per-message dispatch path, which ticks only the message counter (sub_total_message_finished),
  # NOT the batch counter -- the sub-side batch counters fire on the liaison's OAP-facing receive
  # hop (handleEOF), not on the data node, so a per-node `queue_sub_batch_*` is empty on data and is
  # intentionally not modeled here. Batch-level granularity lives on the liaison's publish side
  # (liaison_publish_batch_throughput / liaison_publish_batch_latency_p99 above).
  - name: data_queue_sub_message_throughput
    exp: banyandb_queue_sub_total_message_finished.sum(['cluster','pod_name','container_name','node_role','node_type','operation']).rate('PT1M')
  # retention disk-usage % per data-model scope (0-100 gauge). Kept per scope rather than summed (a sum
  # of three percentages is meaningless). Not in the upstream Grafana boards; a SkyWalking addition.
  - name: data_retention_measure_disk_usage_percent
    exp: banyandb_storage_retention_measure_disk_usage_percent
  - name: data_retention_stream_disk_usage_percent
    exp: banyandb_storage_retention_stream_disk_usage_percent
  - name: data_retention_trace_disk_usage_percent
    exp: banyandb_storage_retention_trace_disk_usage_percent

  # ---- Lifecycle only (the tier-migration sidecar on hot/warm data pods; container_name == lifecycle) ----
  # cumulative migration cycles. Compiled into build #1166 (BanyanDB #1164) but lazily registered:
  # emits no series until the first migration cycle fires. Dashboard renders absent-as-0.
  - name: lifecycle_migration_cycles
    exp: banyandb_lifecycle_cycles_total
  # seconds since the last migration cycle started = now - epoch. time() is the MAL ingest-time scalar
  # (MQE has no current-time function), computed when the rule runs. BUILD-GATED: the source gauge is
  # BanyanDB #1167+, absent on build #1166 -> no series until the cluster runs >= #1167 AND a cycle ends.
  - name: lifecycle_last_run
    exp: (time() - banyandb_lifecycle_last_run_timestamp_seconds.max(['cluster','pod_name','container_name','node_role','node_type']))
  # last cycle status (1 = OK, 0 = failed). Same #1167 build gate as lifecycle_last_run.
  - name: lifecycle_last_run_success
    exp: banyandb_lifecycle_last_run_success
