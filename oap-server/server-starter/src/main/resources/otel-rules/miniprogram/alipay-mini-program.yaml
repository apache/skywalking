# Alipay Mini Program service-level metrics from the mini-program-monitor SDK.
# Alipay's base library does not expose the PerformanceObserver events WeChat
# does (route/script/packageLoad/first_paint), so those metrics are absent here
# — the SDK falls back to lifecycle hooks for app_launch / first_render, which
# are approximations rather than renderer-authoritative timings.
# Aggregated across all app versions (instances).

expSuffix: service(['service_name'], Layer.ALIPAY_MINI_PROGRAM)
metricPrefix: meter_alipay_mp
filter: "{ tags -> tags.miniprogram_platform == 'alipay' }"

metricsRules:
  # Perf (service-wide averages)
  - name: app_launch_duration
    exp: miniprogram_app_launch_duration.avg(['service_name'])
  - name: first_render_duration
    exp: miniprogram_first_render_duration.avg(['service_name'])

  # Request load (calls per minute) — delta counter.
  - name: request_cpm
    exp: miniprogram_request_duration_count.sum(['service_name'])

  # Request latency percentile — bucket `le` labels already in ms.
  - name: request_duration_percentile
    exp: miniprogram_request_duration.sum(['service_name', 'le']).histogram("le", TimeUnit.MILLISECONDS).histogram_percentile([50,75,90,95,99])

  # Per-page (endpoint-scoped) variants — chained .endpoint(...) overrides the expSuffix.
  - name: endpoint_app_launch_duration
    exp: miniprogram_app_launch_duration.avg(['service_name', 'miniprogram_page_path']).endpoint(['service_name'], ['miniprogram_page_path'], Layer.ALIPAY_MINI_PROGRAM)
  - name: endpoint_first_render_duration
    exp: miniprogram_first_render_duration.avg(['service_name', 'miniprogram_page_path']).endpoint(['service_name'], ['miniprogram_page_path'], Layer.ALIPAY_MINI_PROGRAM)
  - name: endpoint_request_cpm
    exp: miniprogram_request_duration_count.sum(['service_name', 'miniprogram_page_path']).endpoint(['service_name'], ['miniprogram_page_path'], Layer.ALIPAY_MINI_PROGRAM)
  - name: endpoint_request_duration_percentile
    exp: miniprogram_request_duration.sum(['service_name', 'miniprogram_page_path', 'le']).histogram("le", TimeUnit.MILLISECONDS).histogram_percentile([50,75,90,95,99]).endpoint(['service_name'], ['miniprogram_page_path'], Layer.ALIPAY_MINI_PROGRAM)
