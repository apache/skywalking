# Alipay Mini Program instance-level (per app version) metrics.
# Mirrors alipay-mini-program.yaml scoped to service instance. Meaningful only
# when the operator follows the recommended serviceInstance == serviceVersion
# pattern (see SWIP-12 §2) — otherwise the service_instance_id label is empty
# and no instance traffic is produced.

expSuffix: instance(['service_name'], ['service_instance_id'], Layer.ALIPAY_MINI_PROGRAM)
metricPrefix: meter_alipay_mp_instance
filter: "{ tags -> tags.miniprogram_platform == 'alipay' }"

metricsRules:
  - name: app_launch_duration
    exp: miniprogram_app_launch_duration.avg(['service_name', 'service_instance_id'])
  - name: first_render_duration
    exp: miniprogram_first_render_duration.avg(['service_name', 'service_instance_id'])
  - name: request_cpm
    exp: miniprogram_request_duration_count.sum(['service_name', 'service_instance_id'])
  - name: request_duration_percentile
    exp: miniprogram_request_duration.sum(['service_name', 'service_instance_id', 'le']).histogram("le", TimeUnit.MILLISECONDS).histogram_percentile([50,75,90,95,99])
