# iOS MetricKit service-level metrics from Apple's MetricKit framework.
# Aggregated across all app versions (instances) and devices.

expSuffix: service(['service_name'], Layer.IOS)
metricPrefix: meter_ios

metricsRules:
  # App responsiveness
  - name: app_launch_time_percentile
    exp: metrickit_app_launch_time_histogram.sum(['service_name', 'le']).histogram().histogram_percentile([50,75,90,95,99])
  - name: hang_time_sum
    exp: metrickit_hang_time.sum(['service_name'])
  - name: hang_time_percentile
    exp: metrickit_hang_time_histogram.sum(['service_name', 'le']).histogram().histogram_percentile([50,75,90,95,99])

  # Stability — sum across all devices and versions
  - name: foreground_abnormal_exit_count
    exp: metrickit_foreground_abnormal_exit_count.sum(['service_name'])
  - name: background_abnormal_exit_count
    exp: metrickit_background_abnormal_exit_count.sum(['service_name'])
  - name: background_oom_kill_count
    exp: metrickit_background_oom_kill_count.sum(['service_name'])

  # Resource usage
  - name: peak_memory
    exp: metrickit_peak_memory.max(['service_name'])
  - name: cpu_time
    exp: metrickit_cpu_time.sum(['service_name'])
  - name: gpu_time
    exp: metrickit_gpu_time.sum(['service_name'])
  - name: disk_write
    exp: metrickit_disk_write.sum(['service_name'])

  # Network transfer — average per device
  - name: wifi_download
    exp: metrickit_wifi_download.avg(['service_name'])
  - name: wifi_upload
    exp: metrickit_wifi_upload.avg(['service_name'])
  - name: cellular_download
    exp: metrickit_cellular_download.avg(['service_name'])
  - name: cellular_upload
    exp: metrickit_cellular_upload.avg(['service_name'])

  # UI quality
  - name: scroll_hitch_ratio
    exp: metrickit_scroll_hitch_ratio.avg(['service_name'])
