# Node.js runtime metrics via MeterReportService (instance_nodejs_*).

expSuffix: instance(['service'], ['instance'], Layer.GENERAL)
metricPrefix: meter
metricsRules:
  - name: instance_nodejs_process_cpu
    exp: instance_nodejs_process_cpu
  - name: instance_nodejs_heap_used
    exp: instance_nodejs_heap_used
  - name: instance_nodejs_heap_total
    exp: instance_nodejs_heap_total
  - name: instance_nodejs_heap_limit
    exp: instance_nodejs_heap_limit
  - name: instance_nodejs_rss
    exp: instance_nodejs_rss
  - name: instance_nodejs_external_memory
    exp: instance_nodejs_external_memory
