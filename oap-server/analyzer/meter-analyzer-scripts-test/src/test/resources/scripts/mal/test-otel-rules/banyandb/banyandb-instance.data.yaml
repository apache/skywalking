# Fixture for the role-separated banyandb-instance.yaml (SWIP-15). Every sample carries the
# ['cluster','pod_name','container_name','node_role','node_type'] group-by labels that each rule's
# .sum()/.avg()/.max() reduction keeps, so the instance() properties closure resolves a stable
# identity (data@test-pod, layer BANYANDB) for every metric. container_name is held at 'data' across
# all families: the role prefix on a rule NAME does not filter by container_name in the expression,
# so each rule resolves on whatever container emits its source family and produces a non-empty result.
script: oap-server/server-starter/src/main/resources/otel-rules/banyandb/banyandb-instance.yaml
input:
  # ---- All-roles resource / runtime families (unprefixed rules) ----
  banyandb_system_up_time:
    - labels:
        cluster: 'test-cluster'
