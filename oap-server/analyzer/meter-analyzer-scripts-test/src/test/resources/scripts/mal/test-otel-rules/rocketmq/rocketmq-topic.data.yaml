script: oap-server/server-starter/src/main/resources/otel-rules/rocketmq/rocketmq-topic.yaml
input:
  rocketmq_producer_message_size:
    - labels:
        cluster: test-cluster
        topic: test-topic
      value: 100.0
  rocketmq_consumer_message_size:
    - labels:
        cluster: test-cluster
        topic: test-topic
        group: test-value
      value: 100.0
  rocketmq_group_get_latency_by_storetime:
    - labels:
        cluster: test-cluster
        topic: test-topic
        group: test-value
      value: 100.0
  rocketmq_producer_tps:
    - labels:
        cluster: test-cluster
        topic: test-topic
      value: 100.0
  rocketmq_consumer_tps:
    - labels:
        cluster: test-cluster
        topic: test-topic
      value: 100.0
  rocketmq_producer_offset:
    - labels:
        cluster: test-cluster
        topic: test-topic
        broker: test-broker
      value: 100.0
  rocketmq_consumer_offset:
    - labels:
        cluster: test-cluster
        topic: test-topic
        group: test-value
      value: 100.0
expected:
  meter_rocketmq_topic_max_producer_message_size:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
        value: 100.0
  meter_rocketmq_topic_max_consumer_message_size:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
          group: test-value
        value: 100.0
  meter_rocketmq_topic_consumer_latency:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
          group: test-value
        value: 100.0
  meter_rocketmq_topic_producer_tps:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
        value: 100.0
  meter_rocketmq_topic_consumer_group_tps:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
        value: 100.0
  meter_rocketmq_topic_producer_offset:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
        value: 100.0
  meter_rocketmq_topic_consumer_group_offset:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
          group: test-value
        value: 100.0
  meter_rocketmq_topic_producer_message_size:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
        value: 100.0
  meter_rocketmq_topic_consumer_message_size:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
          group: test-value
        value: 100.0
  meter_rocketmq_topic_consumer_group_count:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
        value: 1.0
  meter_rocketmq_topic_broker_count:
    entities:
      - scope: ENDPOINT
        service: 'rocketmq::test-cluster'
        endpoint: test-topic
        layer: ROCKETMQ
    samples:
      - labels:
          cluster: 'rocketmq::test-cluster'
          topic: test-topic
        value: 1.0
