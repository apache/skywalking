script: oap-server/server-starter/src/main/resources/otel-rules/mysql/mysql-instance.yaml
input:
  mysql_global_status_uptime:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_variables_innodb_buffer_pool_size:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_variables_max_connections:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_variables_thread_cache_size:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_status_commands_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
        command: insert
      value: 100.0
    - labels:
        host_name: test-host
        service_instance_id: test-instance
        command: select
      value: 100.0
    - labels:
        host_name: test-host
        service_instance_id: test-instance
        command: delete
      value: 100.0
    - labels:
        host_name: test-host
        service_instance_id: test-instance
        command: update
      value: 100.0
    - labels:
        host_name: test-host
        service_instance_id: test-instance
        command: rollback
      value: 100.0
  mysql_global_status_queries:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_status_threads_connected:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_status_threads_created:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_status_threads_running:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_status_threads_cached:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_status_aborted_connects:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  mysql_global_status_connection_errors_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
        error: max_connection
      value: 100.0
    - labels:
        host_name: test-host
        service_instance_id: test-instance
        error: internal
      value: 100.0
  mysql_global_status_slow_queries:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
expected:
  meter_mysql_instance_uptime:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_innodb_buffer_pool_size:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_max_connections:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_thread_cache_size:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_commands_insert_rate:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          command: insert
          service_instance_id: test-instance
        value: 25.0
  meter_mysql_instance_commands_select_rate:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          command: select
          service_instance_id: test-instance
        value: 25.0
  meter_mysql_instance_commands_delete_rate:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          command: delete
          service_instance_id: test-instance
        value: 25.0
  meter_mysql_instance_commands_update_rate:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          command: update
          service_instance_id: test-instance
        value: 25.0
  meter_mysql_instance_qps:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 25.0
  meter_mysql_instance_tps:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          command: rollback
          service_instance_id: test-instance
        value: 25.0
  meter_mysql_instance_threads_connected:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_threads_created:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_threads_running:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_threads_cached:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_connects_aborted:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_connects_available:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 0.0
  meter_mysql_instance_connection_errors_max_connections:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          error: max_connection
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_connection_errors_internal:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          error: internal
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_mysql_instance_slow_queries_rate:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'mysql::test-host'
        instance: test-instance
        layer: MYSQL
    samples:
      - labels:
          host_name: 'mysql::test-host'
          service_instance_id: test-instance
        value: 25.0
