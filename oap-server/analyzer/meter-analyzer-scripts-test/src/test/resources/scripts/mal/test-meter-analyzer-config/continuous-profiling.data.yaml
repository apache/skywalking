script: oap-server/server-starter/src/main/resources/meter-analyzer-config/continuous-profiling.yaml
input:
  rover_con_p_process_cpu:
    - labels:
        service: test-service
        instance: test-instance
        process_name: test-process
        layer: GENERAL
      value: 100.0
  rover_con_p_process_thread_count:
    - labels:
        service: test-service
        instance: test-instance
        process_name: test-process
        layer: GENERAL
      value: 100.0
  rover_con_p_system_load:
    - labels:
        service: test-service
        instance: test-instance
        process_name: test-process
        layer: GENERAL
      value: 100.0
  rover_con_p_http_error_rate:
    - labels:
        service: test-service
        instance: test-instance
        process_name: test-process
        layer: GENERAL
        uri: /test-uri
      value: 100.0
  rover_con_p_http_avg_response_time:
    - labels:
        service: test-service
        instance: test-instance
        process_name: test-process
        layer: GENERAL
        uri: /test-uri
      value: 100.0
expected:
  continuous_profiling_process_cpu:
    entities:
      - scope: PROCESS
        service: test-service
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          service: test-service
          instance: test-instance
          process_name: test-process
          layer: GENERAL
        value: 1000000.0
  continuous_profiling_process_thread_count:
    entities:
      - scope: PROCESS
        service: test-service
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          service: test-service
          instance: test-instance
          process_name: test-process
          layer: GENERAL
        value: 100.0
  continuous_profiling_system_load:
    entities:
      - scope: PROCESS
        service: test-service
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          service: test-service
          instance: test-instance
          process_name: test-process
          layer: GENERAL
        value: 10000.0
  continuous_profiling_http_error_rate:
    entities:
      - scope: PROCESS
        service: test-service
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          service: test-service
          instance: test-instance
          process_name: test-process
          layer: GENERAL
          uri: /test-uri
        value: 10000.0
  continuous_profiling_http_avg_response_time:
    entities:
      - scope: PROCESS
        service: test-service
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          service: test-service
          instance: test-instance
          process_name: test-process
          layer: GENERAL
          uri: /test-uri
        value: 100.0
