script: oap-server/server-starter/src/main/resources/envoy-metrics-rules/envoy-svc-relation.yaml
input:
  envoy_cluster_metrics:
    - labels:
        app: test-app
        cluster_name: test-cluster
        metrics_name: cluster.outbound.test-cluster.upstream_cx_active
      value: 100.0
    - labels:
        app: test-app
        cluster_name: test-cluster
        metrics_name: cluster.outbound.test-cluster.upstream_cx_total
      value: 100.0
    - labels:
        app: test-app
        cluster_name: test-cluster
        metrics_name: cluster.outbound.test-cluster.upstream_rq_active
      value: 100.0
    - labels:
        app: test-app
        cluster_name: test-cluster
        metrics_name: cluster.outbound.test-cluster.upstream_rq_total
      value: 100.0
    - labels:
        app: test-app
        cluster_name: test-cluster
        metrics_name: cluster.outbound.test-cluster.upstream_rq_pending_active
      value: 100.0
    - labels:
        app: test-app
        cluster_name: test-cluster
        metrics_name: cluster.outbound.test-cluster.lb_healthy_panic
      value: 100.0
    - labels:
        app: test-app
        cluster_name: test-cluster
        metrics_name: cluster.outbound.test-cluster.upstream_cx_none_healthy
      value: 100.0
expected:
  envoy_sr_cluster_up_cx_active:
    entities:
      - scope: SERVICE_RELATION
        layer: MESH_DP
    samples:
      - labels:
          app: test-app
          cluster_name: test-cluster
        value: 100.0
  envoy_sr_cluster_up_cx_incr:
    entities:
      - scope: SERVICE_RELATION
        layer: MESH_DP
    samples:
      - labels:
          app: test-app
          cluster_name: test-cluster
        value: 50.0
  envoy_sr_cluster_up_rq_active:
    entities:
      - scope: SERVICE_RELATION
        layer: MESH_DP
    samples:
      - labels:
          app: test-app
          cluster_name: test-cluster
        value: 100.0
  envoy_sr_cluster_up_rq_incr:
    entities:
      - scope: SERVICE_RELATION
        layer: MESH_DP
    samples:
      - labels:
          app: test-app
          cluster_name: test-cluster
        value: 50.0
  envoy_sr_cluster_up_rq_pending_active:
    entities:
      - scope: SERVICE_RELATION
        layer: MESH_DP
    samples:
      - labels:
          app: test-app
          cluster_name: test-cluster
        value: 100.0
  envoy_sr_cluster_lb_healthy_panic_incr:
    entities:
      - scope: SERVICE_RELATION
        layer: MESH_DP
    samples:
      - labels:
          app: test-app
          cluster_name: test-cluster
        value: 50.0
  envoy_sr_cluster_up_cx_none_healthy_incr:
    entities:
      - scope: SERVICE_RELATION
        layer: MESH_DP
    samples:
      - labels:
          app: test-app
          cluster_name: test-cluster
        value: 50.0
