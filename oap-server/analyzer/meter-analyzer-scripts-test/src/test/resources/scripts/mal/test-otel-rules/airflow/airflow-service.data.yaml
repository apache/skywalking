script: oap-server/server-starter/src/main/resources/otel-rules/airflow/airflow-service.yaml
input:
  airflow_scheduler_tasks_executable:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 5.0
  airflow_executor_queued_tasks:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 3.0
  airflow_executor_running_tasks:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 2.0
  airflow_executor_open_slots:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 16.0
  airflow_pool_queued_slots:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        pool_name: default_pool
      value: 1.0
  airflow_pool_deferred_slots:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        pool_name: default_pool
      value: 0.0
  airflow_pool_scheduled_slots:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        pool_name: default_pool
      value: 1.0
  airflow_scheduler_heartbeat:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 10.0
  airflow_scheduler_orphaned_tasks_cleared:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 2.0
  airflow_scheduler_orphaned_tasks_adopted:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 1.0
  airflow_dag_processing_file_path_queue_size:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 4.0
  airflow_dataset_updates:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
      value: 7.0
