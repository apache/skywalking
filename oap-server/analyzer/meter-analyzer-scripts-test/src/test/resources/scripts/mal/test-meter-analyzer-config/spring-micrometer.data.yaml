script: oap-server/server-starter/src/main/resources/meter-analyzer-config/spring-micrometer.yaml
input:
  http_server_requests_count:
    - labels:
        instance: test-instance
      value: 100.0
  http_server_requests_sum:
    - labels:
        instance: test-instance
      value: 100.0
  jdbc_connections_active:
    - labels:
        instance: test-instance
      value: 100.0
  jdbc_connections_idle:
    - labels:
        instance: test-instance
      value: 100.0
  jdbc_connections_max:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_classes_loaded:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_classes_unloaded:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_gc_pause_count:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_gc_pause_sum:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_memory_committed:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_memory_max:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_memory_used:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_threads_daemon:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_threads_live:
    - labels:
        instance: test-instance
      value: 100.0
  jvm_threads_peak:
    - labels:
        instance: test-instance
      value: 100.0
  process_cpu_usage:
    - labels:
        instance: test-instance
      value: 100.0
  system_cpu_usage:
    - labels:
        instance: test-instance
      value: 100.0
  system_load_average_1m:
    - labels:
        instance: test-instance
      value: 100.0
  tomcat_sessions_active_current:
    - labels:
        instance: test-instance
      value: 100.0
  tomcat_sessions_active_max:
    - labels:
        instance: test-instance
      value: 100.0
  tomcat_sessions_rejected:
    - labels:
        instance: test-instance
      value: 100.0
  process_files_max:
    - labels:
        instance: test-instance
      value: 100.0
  process_files_open:
    - labels:
        instance: test-instance
      value: 100.0
expected:
  meter_http_server_requests_count:
    entities:
      - scope: SERVICE_INSTANCE
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 50.0
  meter_http_server_requests_duration:
