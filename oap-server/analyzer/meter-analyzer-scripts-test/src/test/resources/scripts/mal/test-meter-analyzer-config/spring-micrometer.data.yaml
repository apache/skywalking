        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 100.0
  meter_jvm_threads_peak:
    entities:
      - scope: SERVICE_INSTANCE
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 100.0
  meter_process_cpu_usage:
