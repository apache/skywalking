script: oap-server/server-starter/src/main/resources/meter-analyzer-config/nodejs-runtime.yaml
input:
  instance_nodejs_process_cpu:
    - labels:
        instance: test-instance
      value: 12.5
  instance_nodejs_heap_used:
    - labels:
        instance: test-instance
      value: 1048576.0
  instance_nodejs_heap_total:
    - labels:
        instance: test-instance
      value: 2097152.0
  instance_nodejs_heap_limit:
    - labels:
        instance: test-instance
      value: 4294967296.0
  instance_nodejs_rss:
    - labels:
        instance: test-instance
      value: 3145728.0
  instance_nodejs_external_memory:
    - labels:
        instance: test-instance
      value: 65536.0
expected:
  meter_instance_nodejs_process_cpu:
    entities:
      - scope: SERVICE_INSTANCE
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 12.5
  meter_instance_nodejs_heap_used:
    entities:
      - scope: SERVICE_INSTANCE
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 1048576.0
  meter_instance_nodejs_heap_total:
    entities:
      - scope: SERVICE_INSTANCE
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 2097152.0
  meter_instance_nodejs_heap_limit:
    entities:
      - scope: SERVICE_INSTANCE
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 4294967296.0
  meter_instance_nodejs_rss:
    entities:
      - scope: SERVICE_INSTANCE
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 3145728.0
  meter_instance_nodejs_external_memory:
    entities:
      - scope: SERVICE_INSTANCE
        instance: test-instance
        layer: GENERAL
    samples:
      - labels:
          instance: test-instance
        value: 65536.0
