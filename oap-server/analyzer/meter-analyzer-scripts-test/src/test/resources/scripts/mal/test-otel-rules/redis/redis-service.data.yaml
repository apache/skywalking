script: oap-server/server-starter/src/main/resources/otel-rules/redis/redis-service.yaml
input:
  redis_uptime_in_seconds:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_connected_clients:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_blocked_clients:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_memory_used_bytes:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_memory_max_bytes:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_commands_total:
    - labels:
        cmd: get
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_keyspace_hits_total:
    - labels:
        service_instance_id: test-instance
        host_name: test-host
      value: 100.0
  redis_keyspace_misses_total:
    - labels:
        service_instance_id: test-instance
        host_name: test-host
      value: 100.0
  redis_net_input_bytes_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_net_output_bytes_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_db_keys:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_expired_keys_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_evicted_keys_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_commands_duration_seconds_total:
    - labels:
        host_name: test-host
        cmd: get
        service_instance_id: test-instance
      value: 100.0
expected:
  meter_redis_uptime:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_redis_connected_clients:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_redis_blocked_clients:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_redis_memory_used_bytes:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_redis_memory_max_bytes:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_redis_total_commands_rate:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          cmd: get
          service_instance_id: test-instance
        value: 25.0
  meter_redis_hit_rate:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 50.0
  meter_redis_net_input_bytes_total:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 25.0
  meter_redis_net_output_bytes_total:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 25.0
  meter_redis_db_keys:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_redis_expired_keys_total:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_redis_evicted_keys_total:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          service_instance_id: test-instance
        value: 100.0
  meter_redis_commands_duration:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          cmd: get
          service_instance_id: test-instance
        value: 100.0
  meter_redis_commands_total:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          cmd: get
          service_instance_id: test-instance
        value: 100.0
  meter_redis_commands_duration_seconds_total_rate:
    entities:
      - scope: SERVICE
        service: 'redis::test-host'
        layer: REDIS
    samples:
      - labels:
          host_name: 'redis::test-host'
          cmd: get
          service_instance_id: test-instance
        value: 25.0
