script: oap-server/server-starter/src/main/resources/log-mal-rules/nginx.yaml
input:
  nginx_error_log_count:
    - labels:
        level: ERROR
        service: test-service
        service_instance_id: test-instance
      value: 100.0
expected:
  meter_nginx_service_error_log_count:
    entities:
      - scope: SERVICE
        service: test-service
        layer: NGINX
    samples:
      - labels:
          level: ERROR
          service: test-service
          service_instance_id: test-instance
        value: 100.0
  meter_nginx_instance_error_log_count:
    entities:
      - scope: SERVICE_INSTANCE
        service: test-service
        instance: test-instance
        layer: NGINX
    samples:
      - labels:
          level: ERROR
          service: test-service
          service_instance_id: test-instance
        value: 100.0
