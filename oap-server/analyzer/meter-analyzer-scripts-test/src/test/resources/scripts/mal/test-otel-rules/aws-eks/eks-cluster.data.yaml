        layer: AWS_EKS
    samples:
      - labels:
          ClusterName: test-cluster
          cluster: 'aws-eks-cluster::test-cluster'
        value: 100.0
  eks_cluster_net_tx_error:
    entities:
      - scope: SERVICE
        service: 'aws-eks-cluster::test-cluster'
        layer: AWS_EKS
    samples:
      - labels:
          ClusterName: test-cluster
          cluster: 'aws-eks-cluster::test-cluster'
