script: oap-server/server-starter/src/main/resources/otel-rules/aws-eks/eks-cluster.yaml
input:
  cluster:
    - labels:
        ClusterName: test-cluster
      value: 100.0
  cluster_node_count:
    - labels:
        ClusterName: test-cluster
      value: 100.0
  cluster_failed_node_count:
    - labels:
        ClusterName: test-cluster
      value: 100.0
  namespace_number_of_running_pods:
    - labels:
        ClusterName: test-cluster
      value: 100.0
  service_number_of_running_pods:
    - labels:
        ClusterName: test-cluster
      value: 100.0
  node_network_rx_dropped:
    - labels:
        ClusterName: test-cluster
      value: 100.0
  node_network_rx_errors:
    - labels:
        ClusterName: test-cluster
      value: 100.0
  node_network_tx_dropped:
    - labels:
        ClusterName: test-cluster
      value: 100.0
  node_network_tx_errors:
    - labels:
        ClusterName: test-cluster
      value: 100.0
expected:
