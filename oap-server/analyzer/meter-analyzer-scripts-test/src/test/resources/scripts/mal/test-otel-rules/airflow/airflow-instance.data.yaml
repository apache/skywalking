script: oap-server/server-starter/src/main/resources/otel-rules/airflow/airflow-instance.yaml
input:
  airflow_pool_open_slots:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-worker-1
        pool_name: default_pool
      value: 8.0
  airflow_pool_deferred_slots:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-worker-1
        pool_name: default_pool
      value: 0.0
  airflow_pool_running_slots:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-worker-1
        pool_name: default_pool
      value: 2.0
  airflow_pool_scheduled_slots:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-scheduler
        pool_name: default_pool
      value: 1.0
  airflow_triggerer_heartbeat:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-triggerer
      value: 5.0
  airflow_triggers_blocked_main_thread:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-triggerer
      value: 0.0
  airflow_triggers_failed:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-triggerer
      value: 0.0
  airflow_triggers_succeeded:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-triggerer
      value: 3.0
  airflow_scheduler_tasks_executable:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-scheduler
      value: 5.0
  airflow_scheduler_orphaned_tasks_cleared:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-scheduler
      value: 2.0
  airflow_scheduler_orphaned_tasks_adopted:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-scheduler
      value: 1.0
  airflow_executor_queued_tasks:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-scheduler
      value: 2.0
  airflow_executor_running_tasks:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-scheduler
      value: 1.0
  airflow_dataset_updates:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-worker-1
      value: 4.0
  airflow_dataset_orphaned:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-scheduler
      value: 1.0
  airflow_dataset_triggered_dagruns:
    - labels:
        cluster: airflow-cluster
        job_name: Airflow
        host_name: airflow-scheduler
      value: 2.0
