    - labels:
        cluster: test-cluster
        service: test-service
      value: 1.0
  kube_pod_container_resource_requests:
    - labels:
        cluster: test-cluster
        service: test-service
        resource: cpu
      value: 1.0
    - labels:
        cluster: test-cluster
        service: test-service
        resource: memory
      value: 1.0
  kube_pod_container_resource_limits:
    - labels:
        cluster: test-cluster
        service: test-service
        resource: cpu
      value: 1.0
    - labels:
        cluster: test-cluster
        service: test-service
        resource: memory
      value: 1.0
  kube_pod_status_phase:
    - labels:
        cluster: test-cluster
        service: test-service
        pod: test-pod
        phase: test-value
      value: 1.0
  kube_pod_container_status_waiting_reason:
    - labels:
        cluster: test-cluster
        service: test-service
        pod: test-pod
        container: test-container
        reason: test-value
