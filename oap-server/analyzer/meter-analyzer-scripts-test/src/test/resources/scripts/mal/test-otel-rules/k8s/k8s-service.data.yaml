      - labels:
          cluster: test-cluster
          service: test-service
        value: 1.0
  k8s_service_cpu_cores_requests:
    entities:
      - scope: SERVICE
        service: 'test-cluster::test-service'
        layer: K8S_SERVICE
    samples:
      - labels:
          cluster: test-cluster
          service: test-service
        value: 1000.0
  k8s_service_cpu_cores_limits:
    entities:
      - scope: SERVICE
        service: 'test-cluster::test-service'
        layer: K8S_SERVICE
    samples:
