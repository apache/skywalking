    samples:
      - labels:
          cluster: test-cluster
          service: test-service
          pod: test-pod
        value: 1.0
  k8s_service_pod_cpu_usage:
    entities:
      - scope: SERVICE
        service: 'test-cluster::test-service'
        layer: K8S_SERVICE
