script: oap-server/server-starter/src/main/resources/otel-rules/k8s/k8s-instance.yaml
input:
  kube_pod_status_phase:
    - labels:
        cluster: test-cluster
        namespace: test-namespace
        service: test-service
        pod: test-pod
      value: 100.0
expected:
  k8s_service_instance_pod_instance_status:
    entities:
      - scope: SERVICE_INSTANCE
        service: 'test-cluster::test-pod.test-namespace'
        instance: test-pod
        layer: K8S_SERVICE
    samples:
      - labels:
          cluster: test-cluster
          namespace: test-namespace
          service: test-pod.test-namespace
          pod: test-pod
        value: 100.0
