# Mock data for the TYPE-SEPARATED banyandb-endpoint.yaml (SWIP-15 redesign). Each data-model
# type emits a DIFFERENT family namespace and maps to a different realistic storage group, so
# every per-type rule resolves to exactly ONE Endpoint entity keyed on ['cluster','group']:
#   measure  families -> group sw_metricsMinute  (endpoint sw_metricsMinute)
#   stream   families -> group sw_records        (endpoint sw_records)        [storage + tst index]
#   trace    families -> group sw_trace          (endpoint sw_trace)
#   property families -> group sw_property        (endpoint sw_property)
# The type-agnostic queue/publish families key on group+operation (not a data-model type); they
# are given the measure write-target group sw_metricsMinute. Division rules (query_latency,
# merge_file_latency/_partitions, property_index_merge_latency) inner-join two families of the
# SAME namespace on ['cluster','group'], so both operands carry the same group here.
script: oap-server/server-starter/src/main/resources/otel-rules/banyandb/banyandb-endpoint.yaml
input:
  # ---- Write rate (per data-model type) ----
  banyandb_measure_total_written:
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'data'
        node_role: 'ROLE_DATA'
        node_type: 'hot'
        group: 'sw_metricsMinute'
      value: 100.0
  banyandb_stream_tst_total_written:
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'data'
        node_role: 'ROLE_DATA'
        node_type: 'hot'
        group: 'sw_records'
      value: 100.0
  banyandb_trace_tst_total_written:
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'data'
        node_role: 'ROLE_DATA'
        node_type: 'hot'
        group: 'sw_trace'
      value: 100.0

  # ---- Query latency (per data-model type, liaison gRPC method=query, by service facet) ----
  banyandb_liaison_grpc_total_latency:
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'liaison'
        node_role: 'ROLE_LIAISON'
        method: 'query'
        service: 'measure'
        group: 'sw_metricsMinute'
      value: 100.0
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'liaison'
        node_role: 'ROLE_LIAISON'
        method: 'query'
        service: 'stream'
        group: 'sw_records'
      value: 100.0
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'liaison'
        node_role: 'ROLE_LIAISON'
        method: 'query'
        service: 'trace'
        group: 'sw_trace'
      value: 100.0
  banyandb_liaison_grpc_total_finished:
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'liaison'
        node_role: 'ROLE_LIAISON'
        method: 'query'
        service: 'measure'
        group: 'sw_metricsMinute'
      value: 50.0
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'liaison'
        node_role: 'ROLE_LIAISON'
        method: 'query'
        service: 'stream'
        group: 'sw_records'
      value: 50.0
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'liaison'
        node_role: 'ROLE_LIAISON'
        method: 'query'
        service: 'trace'
        group: 'sw_trace'
      value: 50.0

