  banyandb_measure_total_file_elements:
    - labels:
        cluster: 'test-cluster'
        pod_name: 'test-pod'
        container_name: 'data'
        node_role: 'ROLE_DATA'
        node_type: 'hot'
        group: 'sw_metricsMinute'
        seg: 'seg1'
        shard: '0'
      value: 100.0
