# Feature-focused execution test rules for LAL v2 compiler.
# Each rule exercises a specific LAL language feature.
# Paired with execution-basic.input.data for mock input and expected output.
rules:
  - name: json-parse-extract
    layer: GENERAL
    dsl: |
      filter {
        json {}
        extractor {
          service parsed.service as String
          instance parsed.instance as String
          endpoint parsed.endpoint as String
          layer parsed.layer as String
        }
        sink {}
      }

  - name: tag-condition-true
    layer: GENERAL
    dsl: |
      filter {
        json {}
        if (tag("LOG_KIND") == "SLOW_SQL") {
          extractor {
            service parsed.service as String
          }
          sink {}
        }
      }

  - name: tag-condition-false
    layer: GENERAL
    dsl: |
      filter {
        json {}
        if (tag("LOG_KIND") == "SLOW_SQL") {
          extractor {
            service parsed.service as String
          }
          sink {}
        }
      }

  - name: tag-assignment
    layer: GENERAL
    dsl: |
      filter {
        json {}
        extractor {
          tag key1: parsed.env as String, key2: parsed.region as String
        }
        sink {}
      }

  - name: safe-nav-missing
    layer: GENERAL
    dsl: |
      filter {
        json {}
        extractor {
          service parsed?.missing?.deep as String
        }
        sink {}
      }

  - name: safe-nav-present
    layer: GENERAL
    dsl: |
      filter {
        json {}
        extractor {
          service parsed?.data?.name as String
        }
        sink {}
      }

  - name: if-else-if-error
    layer: GENERAL
    dsl: |
      filter {
        json {}
        if (parsed.level == "ERROR") {
          extractor { service "error-handler" as String }
          sink {}
        } else if (parsed.level == "WARN") {
          extractor { service "warn-handler" as String }
          sink {}
        } else {
          extractor { service "default-handler" as String }
          sink {}
        }
      }

  - name: if-else-if-warn
    layer: GENERAL
    dsl: |
      filter {
        json {}
        if (parsed.level == "ERROR") {
          extractor { service "error-handler" as String }
          sink {}
        } else if (parsed.level == "WARN") {
          extractor { service "warn-handler" as String }
          sink {}
        } else {
          extractor { service "default-handler" as String }
          sink {}
        }
      }

  - name: if-else-if-default
    layer: GENERAL
    dsl: |
      filter {
        json {}
        if (parsed.level == "ERROR") {
          extractor { service "error-handler" as String }
          sink {}
        } else if (parsed.level == "WARN") {
          extractor { service "warn-handler" as String }
          sink {}
        } else {
          extractor { service "default-handler" as String }
          sink {}
        }
      }

  - name: sink-enforcer
    layer: GENERAL
    dsl: |
      filter {
        json {}
        sink {
          enforcer {}
        }
      }

  - name: sink-dropper
    layer: GENERAL
    dsl: |
      filter {
        json {}
        sink {
          dropper {}
        }
      }

  - name: sampler-rate-limit
    layer: GENERAL
    dsl: |
      filter {
        json {}
        sink {
          sampler {
            rateLimit('test:svc') {
              rpm 6000
            }
          }
        }
      }

  - name: sampler-interpolated-id
    layer: GENERAL
    dsl: |
      filter {
        json {}
        sink {
          sampler {
            rateLimit("${parsed.code}") {
              rpm 6000
            }
          }
        }
      }

  - name: abort-stops-pipeline
    layer: GENERAL
    dsl: |
      filter {
        json {}
        abort {}
        extractor {
          service parsed.service as String
        }
        sink {}
      }

  - name: conditional-abort-true
    layer: GENERAL
    dsl: |
      filter {
        json {}
        if (parsed.skip == "true") {
          abort {}
        }
        extractor {
          service parsed.service as String
        }
        sink {}
      }

  - name: conditional-abort-false
    layer: GENERAL
    dsl: |
      filter {
        json {}
        if (parsed.skip == "true") {
          abort {}
        }
        extractor {
          service parsed.service as String
        }
        sink {}
      }

  - name: timestamp-extraction
    layer: GENERAL
    dsl: |
      filter {
        json {}
        extractor {
          timestamp parsed.time as String
        }
        sink {}
      }

  - name: text-parser-regexp
    layer: GENERAL
    dsl: |
      filter {
        text {
          regexp $/(?<ts>\d+) (?<lvl>\w+) (?<msg>.*)/$
        }
        extractor {
          service parsed.lvl as String
        }
        sink {}
      }

  - name: source-attribute-tag
    layer: GENERAL
    dsl: |
      filter {
        extractor {
          tag 'device.model': sourceAttribute("device.model.identifier")
          tag 'os.name': sourceAttribute("os.name")
        }
        sink {}
      }

  - name: source-attribute-condition
    layer: GENERAL
    dsl: |
      filter {
        if (sourceAttribute("os.name") == "iOS") {
          extractor {
            layer "IOS"
            tag 'platform': "ios"
          }
        }
        sink {}
      }

  - name: source-attribute-missing
    layer: GENERAL
    dsl: |
      filter {
        extractor {
          tag 'missing': sourceAttribute("nonexistent.key")
        }
        sink {}
      }

  - name: auto-layer-set
    layer: auto
    dsl: |
      filter {
        json {}
        if (sourceAttribute("os.name") == "iOS") {
          extractor {
            layer "IOS"
            service parsed.service as String
          }
        }
        sink {}
      }

  - name: auto-layer-not-set
    layer: auto
    dsl: |
      filter {
        json {}
        extractor {
          service parsed.service as String
        }
        sink {}
      }

  - name: auto-layer-abort
    layer: auto
    dsl: |
      filter {
        if (sourceAttribute("os.name") != "iOS") {
          abort {}
        }
        extractor {
          layer "IOS"
        }
        sink {}
      }
