# nginx round-robin TCP load-balancer for multi-OAP e2e setups.
# Lets tests address a clustered OAP through a single service name
# (`oap`) on the standard GraphQL/REST port 12800, independent of
# which member is healthy. Use by adding an `oap` nginx service in the
# compose file that mounts this config and depends on oap1/oap2.

events {}

stream {
    upstream graphql {
        server oap1:12800;
        server oap2:12800;
    }
    server {
        listen 12800;
        proxy_pass graphql;
    }
}
