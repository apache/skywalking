# Inspect foreign-metric e2e — Elasticsearch. Two OAPs share one ES (no cluster).
# oap-a loads the inspect-e2e otel-rule (→ meter_inspect_e2e_pool); oap-b does not,
# so that metric is foreign to it (read via the merged metrics-all index).
services:
  es:
    image: elastic/elasticsearch:${ES_VERSION}
    expose:
      - 9200
    networks:
      - e2e
    environment:
      - discovery.type=single-node
      - cluster.routing.allocation.disk.threshold_enabled=false
      - xpack.security.enabled=false
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/9200"]
      interval: 5s
      timeout: 60s
      retries: 120

  oap-a:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    volumes:
      - ./../otel-rules/inspect-e2e.yaml:/skywalking/config/otel-rules/inspect-e2e.yaml
    environment:
      SW_ADMIN_SERVER: default
      SW_INSPECT: default
      JAVA_OPTS: "-Xms512m -Xmx1g"
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: es:9200
      SW_OTEL_RECEIVER: default
      SW_OTEL_RECEIVER_ENABLED_OTEL_METRICS_RULES: "inspect-e2e"
    ports:
      - "17128:17128"
      - "12800:12800"
    depends_on:
      es:
        condition: service_healthy

  oap-b:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    environment:
      SW_ADMIN_SERVER: default
      SW_INSPECT: default
      JAVA_OPTS: "-Xms512m -Xmx1g"
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: es:9200
    ports:
      - "17129:17128"
      - "12801:12800"
    depends_on:
      # Stagger boot: let oap-a initialize the shared storage schema first, then
      # oap-b joins an already-initialized backend. Two OAPs racing first-time
      # index init on a fresh shared ES conflict; this also mirrors a real
      # "second OAP joins the cluster" order.
      oap-a:
        condition: service_healthy

  otlp-emitter:
    build:
      context: ../../runtime-rule/mal-storage/otlp-emitter
    networks:
      - e2e
    environment:
      OTLP_ENDPOINT: http://oap-a:11800
      EMITTER_SERVICE: inspect-e2e-svc
      EMITTER_INSTANCE: inspect-e2e-i1
    depends_on:
      oap-a:
        condition: service_healthy

networks:
  e2e:
