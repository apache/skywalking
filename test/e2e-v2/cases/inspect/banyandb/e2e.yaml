# Inspect API e2e (existing aware path + new foreign-metric path) — BanyanDB.
# Two OAPs share one BanyanDB; oap-a defines meter_inspect_e2e_pool, oap-b does not.
# The flow script asserts the aware path on oap-a (17128) and the foreign path on
# oap-b (17129, via --value-column / --value-type).

setup:
  env: compose
  file: docker-compose.yml
  timeout: 25m
  init-system-environment: ../../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: install jq
      command: |
        if ! command -v jq >/dev/null 2>&1; then
          curl -fsSL -o /tmp/skywalking-infra-e2e/bin/jq \
            https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
          chmod +x /tmp/skywalking-infra-e2e/bin/jq
        fi
    - name: drive inspect aware + foreign flow
      command: |
        set -euo pipefail
        export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
        export A_REST=http://127.0.0.1:17128
        export B_REST=http://127.0.0.1:17129
        bash test/e2e-v2/cases/inspect/inspect-foreign-flow.sh

verify:
  retry:
    count: 1
    interval: 1s
  cases:
    # The flow script drives every assertion inline; this trailing smoke check
    # confirms the inspect port is still serving after the foreign-read phase.
    - query: swctl --display json --admin-url=http://127.0.0.1:17128 admin inspect metrics --regex meter_inspect_e2e_pool >/dev/null && echo ok
      expected: ../expected/ok.txt

cleanup:
  on: always
