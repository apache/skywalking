# Inspect foreign-metric e2e — BanyanDB. Two independent OAPs share one BanyanDB
# (no cluster). oap-a loads the inspect-e2e otel-rule (→ meter_inspect_e2e_pool);
# oap-b does not, so that metric is foreign to it.
services:
  oap-a:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    volumes:
      - ./../otel-rules/inspect-e2e.yaml:/skywalking/config/otel-rules/inspect-e2e.yaml
    environment:
      SW_ADMIN_SERVER: default
      SW_INSPECT: default
      JAVA_OPTS: "-Xms512m -Xmx1g"
      SW_STORAGE: banyandb
      SW_OTEL_RECEIVER: default
      SW_OTEL_RECEIVER_ENABLED_OTEL_METRICS_RULES: "inspect-e2e"
    ports:
      - "17128:17128"
      - "12800:12800"
    depends_on:
      banyandb:
        condition: service_healthy

  oap-b:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    environment:
      SW_ADMIN_SERVER: default
      SW_INSPECT: default
      JAVA_OPTS: "-Xms512m -Xmx1g"
      SW_STORAGE: banyandb
    ports:
      - "17129:17128"
      - "12801:12800"
    depends_on:
      # Stagger boot: let oap-a initialize the shared storage schema first, then
      # oap-b joins an already-initialized backend. Two OAPs racing first-time
      # schema init on a fresh shared DB conflict on ES/JDBC; this also mirrors a
      # real "second OAP joins the cluster" order.
      oap-a:
        condition: service_healthy

  banyandb:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: banyandb

  otlp-emitter:
    build:
      context: ../../runtime-rule/mal-storage/otlp-emitter
    networks:
      - e2e
    environment:
      OTLP_ENDPOINT: http://oap-a:11800
      EMITTER_SERVICE: inspect-e2e-svc
      EMITTER_INSTANCE: inspect-e2e-i1
    depends_on:
      oap-a:
        condition: service_healthy

networks:
  e2e:
