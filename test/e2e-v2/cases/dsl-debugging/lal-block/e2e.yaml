# DSL Debug API — LAL block-granularity. Installs a session against the
# shipped LAL `default` rule with the default granularity (block), drives
# OTLP logs through the pipeline, then asserts the captured records cover
# every block-level stage AND that no per-line records leaked through —
# block-mode invariant. Flow script owns the assertions; this YAML owns
# container lifecycle.

setup:
  env: compose
  file: docker-compose.yml
  timeout: 25m
  init-system-environment: ../../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: install jq
      command: |
        if ! command -v jq >/dev/null 2>&1; then
          curl -fsSL -o /tmp/skywalking-infra-e2e/bin/jq \
            https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
          chmod +x /tmp/skywalking-infra-e2e/bin/jq
        fi
    - name: drive LAL block-mode flow
      command: |
        set -euo pipefail
        export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
        export OAP_HOST=127.0.0.1
        export OAP_REST_PORT=17128
        bash test/e2e-v2/cases/dsl-debugging/lal-block/dsl-debug-flow.sh

verify:
  retry:
    count: 1
    interval: 1s
  cases:
    - query: curl -fsS http://127.0.0.1:17128/dsl-debugging/status >/dev/null && echo ok
      expected: expected/ok.txt

cleanup:
  on: always
  collect:
    on: failure
    output-dir: $SW_INFRA_E2E_LOG_DIR/dsl-debugging-lal-block
    items:
      - service: oap
        paths:
          - /skywalking/logs/
