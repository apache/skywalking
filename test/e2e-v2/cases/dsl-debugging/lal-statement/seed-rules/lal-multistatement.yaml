# Seed LAL rule applied via runtime-rule for the lal-statement e2e.
# Carries a multi-statement extractor block so per-line probes have
# multiple distinct sourceLines to record — block-level captures alone
# would only show one extractor entry, masking line-mode behaviour.
rules:
  - name: e2e-dsldbg-statement
    layer: GENERAL
    dsl: |
      filter {
        extractor {
          tag stage: 'extractor'
          tag emitter: 'e2e-dsldbg'
          tag rule: 'multi-statement'
        }
        sink {
        }
      }
