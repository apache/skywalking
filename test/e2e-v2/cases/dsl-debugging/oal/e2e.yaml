# DSL Debug API — OAL. Reuses the simple/jdk Java-agent provider/consumer
# traffic to drive ServiceRelation source events through the shipped OAL
# pipeline; the debug session attaches to the ServiceRelation dispatcher
# and the flow asserts source / filter / emit captures.

setup:
  env: compose
  file: docker-compose.yml
  timeout: 25m
  init-system-environment: ../../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: install jq
      command: |
        if ! command -v jq >/dev/null 2>&1; then
          curl -fsSL -o /tmp/skywalking-infra-e2e/bin/jq \
            https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
          chmod +x /tmp/skywalking-infra-e2e/bin/jq
        fi

trigger:
  action: http
  interval: 3s
  times: -1
  url: http://${consumer_host}:${consumer_9092}/users
  method: POST
  body: '{"id":"123","name":"skywalking"}'
  headers:
    "Content-Type": "application/json"

verify:
  retry:
    count: 1
    interval: 1s
  cases:
    # The OAL flow drives every assertion itself — this verify only fires after
    # the script returns success.
    - query: bash test/e2e-v2/cases/dsl-debugging/oal/dsl-debug-flow.sh && echo ok
      expected: expected/ok.txt

cleanup:
  on: always
  collect:
    on: failure
    output-dir: $SW_INFRA_E2E_LOG_DIR/dsl-debugging-oal
    items:
      - service: oap
        paths:
          - /skywalking/logs/
