# DSL Debug API — OAL. Reuses the simple/jdk Java-agent compose pattern: OAP +
# BanyanDB + provider + consumer. The consumer's request flow generates trace
# segments and ServiceRelation source events that flow through the shipped
# OAL pipeline; the debug session attaches to the ServiceRelation source's
# dispatcher to capture its source/filter/emit stages.
services:
  oap:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    environment:
      SW_STORAGE: banyandb
      SW_ADMIN_SERVER: default
      SW_DSL_DEBUGGING: default
      SW_DSL_DEBUGGING_INJECTION_ENABLED: "true"
    ports:
      - "11800:11800"
      - "12800:12800"
      - "17128:17128"
    networks:
      - e2e

  banyandb:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: banyandb

  provider:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: provider
    depends_on:
      oap:
        condition: service_healthy
    ports:
      - 9090

  consumer:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: consumer
    ports:
      - 9092
    depends_on:
      provider:
        condition: service_healthy

networks:
  e2e:
