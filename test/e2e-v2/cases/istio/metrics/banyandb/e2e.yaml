# Istio Envoy Metrics Service test with BanyanDB cluster mode (liaison x2, data x2, DNS discovery, native metadata)

setup:
  env: kind
  file: ../../kind.k${KUBERNETES_VERSION}.yaml
  init-system-environment: ../../../../script/env
  kind:
    import-images:
      - skywalking/ui:latest
      - skywalking/oap:latest
    expose-ports:
      - namespace: istio-system
        resource: service/skywalking-ui
        port: 80
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: install kubectl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh kubectl
    - name: install istio
      command: |
        bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh istioctl
        istioctl install -y --set profile=demo \
                  --set meshConfig.defaultConfig.envoyMetricsService.address=skywalking-oap.istio-system:11800 \
                  --set 'meshConfig.defaultConfig.proxyStatsMatcher.inclusionRegexps[0]=.*membership_healthy.*' \
                  --set 'meshConfig.defaultConfig.proxyStatsMatcher.inclusionRegexps[1]=.*upstream_cx_active.*' \
                  --set 'meshConfig.defaultConfig.proxyStatsMatcher.inclusionRegexps[2]=.*upstream_cx_total.*' \
                  --set 'meshConfig.defaultConfig.proxyStatsMatcher.inclusionRegexps[3]=.*upstream_rq_active.*' \
                  --set 'meshConfig.defaultConfig.proxyStatsMatcher.inclusionRegexps[4]=.*upstream_rq_total.*' \
                  --set 'meshConfig.defaultConfig.proxyStatsMatcher.inclusionRegexps[5]=.*upstream_rq_pending_active.*' \
                  --set 'meshConfig.defaultConfig.proxyStatsMatcher.inclusionRegexps[6]=.*lb_healthy_panic.*' \
                  --set 'meshConfig.defaultConfig.proxyStatsMatcher.inclusionRegexps[7]=.*upstream_cx_none_healthy.*' \
                  --set values.telemetry.v2.enabled=false
        kubectl label namespace default istio-injection=enabled
    - name: Install helm
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh helm
    - name: Install SkyWalking with BanyanDB cluster
      command: |
        helm -n istio-system install skywalking \
          oci://ghcr.io/apache/skywalking-helm/skywalking-helm \
          --version "0.0.0-${SW_KUBERNETES_COMMIT_SHA}" \
          --set fullnameOverride=skywalking \
          --set elasticsearch.enabled=false \
          --set oap.env.SW_ENVOY_METRIC_ALS_HTTP_ANALYSIS=$ALS_ANALYZER \
          --set oap.env.SW_ENVOY_METRIC_ALS_TCP_ANALYSIS=$ALS_ANALYZER \
          --set oap.env.K8S_SERVICE_NAME_RULE='e2e::${service.metadata.name}' \
          --set oap.env.SW_HEALTH_CHECKER=default \
          --set oap.replicas=1 \
          --set ui.image.repository=skywalking/ui \
          --set ui.image.tag=latest \
          --set oap.image.tag=latest \
          --set oap.image.repository=skywalking/oap \
          --set oap.storageType=banyandb \
          --set banyandb.enabled=true \
          --set banyandb.standalone.enabled=false \
          --set banyandb.cluster.enabled=true \
          --set banyandb.cluster.liaison.replicas=2 \
          --set banyandb.cluster.data.nodeTemplate.replicas=2 \
          --set banyandb.image.tag=${SW_BANYANDB_COMMIT} \
          --set banyandb.image.repository=ghcr.io/apache/skywalking-banyandb \
          --set "banyandb.cluster.liaison.env[0].name=BYDB_ENABLE_INGESTION_ACCESS_LOG" \
          --set "banyandb.cluster.liaison.env[0].value=\"true\"" \
          --set "banyandb.cluster.liaison.env[1].name=BYDB_ENABLE_QUERY_ACCESS_LOG" \
          --set "banyandb.cluster.liaison.env[1].value=\"true\"" \
          --set "banyandb.cluster.liaison.env[2].name=BYDB_ACCESS_LOG_ROOT_PATH" \
          --set "banyandb.cluster.liaison.env[2].value=/tmp" \
          -f test/e2e-v2/cases/istio/values.yaml
      wait:
        - namespace: istio-system
          resource: deployments/skywalking-oap
          for: condition=available
    - name: Deploy demo services
      command: |
        kubectl apply -f https://raw.githubusercontent.com/istio/istio/$ISTIO_VERSION/samples/bookinfo/platform/kube/bookinfo.yaml
        kubectl apply -f https://raw.githubusercontent.com/istio/istio/$ISTIO_VERSION/samples/bookinfo/networking/bookinfo-gateway.yaml
        kubectl apply -f https://raw.githubusercontent.com/istio/istio/$ISTIO_VERSION/samples/bookinfo/networking/destination-rule-all.yaml
        kubectl apply -f https://raw.githubusercontent.com/istio/istio/$ISTIO_VERSION/samples/bookinfo/networking/virtual-service-all-v1.yaml
      wait:
        - namespace: default
          resource: pod
          for: condition=Ready
    - name: Generate traffic
      path: ../../traffic-gen.yaml
      wait:
        - namespace: default
          resource: pod
          for: condition=Ready
  timeout: 25m

verify:
  retry:
    count: 20
    interval: 15s
  cases:
    - includes:
        - ../metrics-cases.yaml

cleanup:
  on: always
  collect:
    on: failure
    output-dir: $SW_INFRA_E2E_LOG_DIR/banyandb-data
    items:
      - namespace: istio-system
        label-selector: app.kubernetes.io/name=banyandb
        paths:
          - /tmp/trace/
          - /tmp/stream/
          - /tmp/measure/
          - /tmp/property/
          - /tmp/schema-property/
          - /tmp/accesslog/
