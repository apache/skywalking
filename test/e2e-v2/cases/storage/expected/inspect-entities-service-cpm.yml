# /inspect/entities?metric=service_cpm&start=…&end=…&step=MINUTE — expect provider
# and consumer rows (the java-agent showcase deploys both). Date strings are
# dynamic per run; only metric / scope / step / rows are asserted.
metric: service_cpm
scope: Service
step: DAY
start: {{ notEmpty .start }}
end: {{ notEmpty .end }}
rows:
  {{- contains .rows }}
  - entityId: {{ b64enc "e2e-service-provider" }}.1
    decoded:
      serviceName: e2e-service-provider
      isReal: true
    layer: GENERAL
    mqeEntity:
      scope: Service
      serviceName: e2e-service-provider
      normal: true
  - entityId: {{ b64enc "e2e-service-consumer" }}.1
    decoded:
      serviceName: e2e-service-consumer
      isReal: true
    layer: GENERAL
    mqeEntity:
      scope: Service
      serviceName: e2e-service-consumer
      normal: true
  {{- end }}
