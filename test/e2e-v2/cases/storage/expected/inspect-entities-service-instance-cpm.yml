metric: service_instance_cpm
scope: ServiceInstance
step: DAY
start: {{ notEmpty .start }}
end: {{ notEmpty .end }}
rows:
  {{- contains .rows }}
  - entityId: {{ notEmpty .entityId }}
    decoded:
      serviceName: {{ notEmpty .decoded.serviceName }}
      isReal: true
      serviceInstanceName: {{ notEmpty .decoded.serviceInstanceName }}
    layer: GENERAL
    mqeEntity:
      scope: ServiceInstance
      serviceName: {{ notEmpty .mqeEntity.serviceName }}
      normal: true
      serviceInstanceName: {{ notEmpty .mqeEntity.serviceInstanceName }}
  {{- end }}
