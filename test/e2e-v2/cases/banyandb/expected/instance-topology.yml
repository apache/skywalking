# SWIP-15 section 7 intra-cluster instance topology (the Horizon UI "deployment" component): the same
# BanyanDB cluster service appears on both sides of getServiceInstanceTopology (source == dest service),
# so this returns the liaison <-> data instance call graph. We assert the two instance nodes exist and
# the liaison -> data edge is present with both detect points (CLIENT from the publish-side rule, SERVER
# from the subscribe-side rule). `contains` ignores extra edges (e.g. the liaison's self-queue edge).
nodes:
  {{- contains .nodes }}
  - id: {{ b64enc "e2e-banyandb" }}.1_{{ b64enc "banyandb-liaison-0@liaison" }}
    name: banyandb-liaison-0@liaison
    serviceid: {{ b64enc "e2e-banyandb" }}.1
    servicename: e2e-banyandb
    type: ""
    isreal: true
  - id: {{ b64enc "e2e-banyandb" }}.1_{{ b64enc "banyandb-data-hot-0@data" }}
    name: banyandb-data-hot-0@data
    serviceid: {{ b64enc "e2e-banyandb" }}.1
    servicename: e2e-banyandb
    type: ""
    isreal: true
  {{- end }}
calls:
  {{- contains .calls }}
  - source: {{ b64enc "e2e-banyandb" }}.1_{{ b64enc "banyandb-liaison-0@liaison" }}
    sourcecomponents: []
    target: {{ b64enc "e2e-banyandb" }}.1_{{ b64enc "banyandb-data-hot-0@data" }}
    targetcomponents: []
    id: {{ b64enc "e2e-banyandb" }}.1_{{ b64enc "banyandb-liaison-0@liaison" }}-{{ b64enc "e2e-banyandb" }}.1_{{ b64enc "banyandb-data-hot-0@data" }}
    detectpoints:
      - CLIENT
      - SERVER
  {{- end }}
debuggingtrace: null
