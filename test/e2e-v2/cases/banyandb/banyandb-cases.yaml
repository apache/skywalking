# SWIP-15 BanyanDB self-observability metrics, the cluster / container / group model. References
# oap-server/server-starter/src/main/resources/otel-rules/banyandb/{banyandb-service,banyandb-instance,banyandb-endpoint}.yaml
# Entity identities come from the collector's injected labels (otel-collector-config.yaml):
#   Service  = cluster                       -> e2e-banyandb
#   Instance = pod_name '@' container_name    -> banyandb-liaison-0@liaison, banyandb-data-hot-0@data
#   Endpoint = group                          -> sw_metricsMinute (an OAP self-telemetry group)
# Expected templates:
#   metrics-has-value.yml        — single unlabeled series (service/endpoint metrics summed to the entity key)
#   metrics-has-label-value.yml  — labeled series. Instance metrics retain node_role/node_type labels
#                                  (kept in the .sum() group-by so the instance properties closure resolves
#                                  role/tier); reporting_instances is labeled by container_name; queue
#                                  metrics are labeled by operation.
# This minimal cluster (1 liaison + 1 hot data, no FODC) intentionally does NOT cover: lifecycle
# (no migration sidecar / cycle), warm & cold tiers, error counters (lazily registered -> empty on a
# healthy cluster), or multi-node aggregation.
cases:
  # ---- Service scope (cluster KPIs) ----
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_cluster_write_rate --service-name=e2e-banyandb
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_cluster_query_rate --service-name=e2e-banyandb
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_total_cpu_cores --service-name=e2e-banyandb
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_total_memory_used --service-name=e2e-banyandb
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_total_disk_used --service-name=e2e-banyandb
    expected: expected/metrics-has-value.yml
  # live container count by role (labeled by container_name)
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_reporting_instances --service-name=e2e-banyandb
    expected: expected/metrics-has-label-value.yml

  # ---- Instance scope (labeled by node_role/node_type, and operation where applicable) ----
  # data node (banyandb-data-hot-0@data)
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_node_uptime --service-name=e2e-banyandb --instance-name=banyandb-data-hot-0@data
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_cpu_usage --service-name=e2e-banyandb --instance-name=banyandb-data-hot-0@data
    expected: expected/metrics-has-label-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_total_data --service-name=e2e-banyandb --instance-name=banyandb-data-hot-0@data
    expected: expected/metrics-has-label-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_queue_sub_throughput --service-name=e2e-banyandb --instance-name=banyandb-data-hot-0@data
    expected: expected/metrics-has-label-value.yml
  # per-message throughput on the data node (BanyanDB #1169). The data node ingests via the per-message
  # dispatch path, so the sub-side message counter ticks (batch counters fire on the liaison hop, not here).
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_queue_sub_message_throughput --service-name=e2e-banyandb --instance-name=banyandb-data-hot-0@data
    expected: expected/metrics-has-label-value.yml
  # liaison node (banyandb-liaison-0@liaison)
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_node_uptime --service-name=e2e-banyandb --instance-name=banyandb-liaison-0@liaison
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_write_rate --service-name=e2e-banyandb --instance-name=banyandb-liaison-0@liaison
    expected: expected/metrics-has-label-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_publish_throughput --service-name=e2e-banyandb --instance-name=banyandb-liaison-0@liaison
    expected: expected/metrics-has-label-value.yml
  # publish-side batch throughput on the liaison (BanyanDB #1169).
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_instance_publish_batch_throughput --service-name=e2e-banyandb --instance-name=banyandb-liaison-0@liaison
    expected: expected/metrics-has-label-value.yml

  # ---- Endpoint scope (storage group sw_metricsMinute) ----
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_endpoint_write_rate --service-name=e2e-banyandb --endpoint-name=sw_metricsMinute
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_endpoint_total_data --service-name=e2e-banyandb --endpoint-name=sw_metricsMinute
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_endpoint_queue_throughput --service-name=e2e-banyandb --endpoint-name=sw_metricsMinute
    expected: expected/metrics-has-label-value.yml
  # batch + message granularity per group (BanyanDB #1169).
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_endpoint_queue_batch_throughput --service-name=e2e-banyandb --endpoint-name=sw_metricsMinute
    expected: expected/metrics-has-label-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_banyandb_endpoint_queue_message_throughput --service-name=e2e-banyandb --endpoint-name=sw_metricsMinute
    expected: expected/metrics-has-label-value.yml
