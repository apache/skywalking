trace:
  resourceSpans:
    {{- contains .trace.resourceSpans }}
    - resource:
        attributes:
          - key: service.name
            value:
              stringValue: e2e-service-provider
        scopeSpans:
          {{- contains .scopeSpans }}
          - scope:
              name: skywalking-tracer
              version: "0.1.0"
            spans:
              {{- contains .spans }}
              - traceId: {{ notEmpty .traceId }}
                spanId: {{ notEmpty .spanId }}
                parentSpanId: {{ notEmpty .parentSpanId }}
                name: POST:/users
                kind: SPAN_KIND_SERVER
                startTimeUnixNano: "{{ notEmpty .startTimeUnixNano }}"
                endTimeUnixNano: "{{ notEmpty .endTimeUnixNano }}"
                attributes:
                  {{- contains .attributes }}
                  - key: url
                    value:
                      stringValue: http://provider:9090/users
                  - key: http.method
                    value:
                      stringValue: POST
                  - key: http.status_code
                    value:
                      stringValue: "200"
                  - key: component
                    value:
                      stringValue: Tomcat
                  - key: layer
                    value:
                      stringValue: Http
                  {{- end }}
                events: []
                status:
                  code: STATUS_CODE_UNSET
              {{- end }}
          {{- end }}
        - resource:
            attributes:
              - key: service.name
                value:
                  stringValue: e2e-service-consumer
          scopeSpans:
            {{- contains .scopeSpans }}
            - scope:
                name: skywalking-tracer
                version: "0.1.0"
              spans:
                {{- contains .spans }}
                - traceId: {{ notEmpty .traceId }}
                  spanId: {{ notEmpty .spanId }}
                  parentSpanId: {{ notEmpty .parentSpanId }}
                  name: POST:/users
                  kind: SPAN_KIND_SERVER
                  startTimeUnixNano: "{{ notEmpty .startTimeUnixNano }}"
                  endTimeUnixNano: "{{ notEmpty .endTimeUnixNano }}"
                  attributes:
                    {{- contains .attributes }}
                    - key: url
                      value:
                        stringValue: http://provider:9090/users
                    - key: http.method
                      value:
                        stringValue: POST
                    - key: http.status_code
                      value:
                        stringValue: "200"
                    - key: component
                      value:
                        stringValue: Tomcat
                    - key: layer
                      value:
                        stringValue: Http
                    {{- end }}
                  events: []
                  status:
                    code: STATUS_CODE_OK
                {{- end }}
            {{- end }}
  {{- end }}
