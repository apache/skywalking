trace:
  resourceSpans:
    {{- contains .trace.resourceSpans }}
  - resource:
      attributes:
          - key: service.name
            value:
              stringValue: backend
      scopeSpans:
        {{- contains .scopeSpans }}
        - scope:
            name: zipkin-tracer
            version: "0.1.0"
          spans:
            {{- contains .spans }}
            - traceId: {{ notEmpty .traceId }}
              spanId: {{ notEmpty .spanId }}
              parentSpanId: {{ notEmpty .parentSpanId }}
              name: get /api
              kind: SPAN_KIND_SERVER
              startTimeUnixNano: "{{ notEmpty .startTimeUnixNano }}"
              endTimeUnixNano: "{{ notEmpty .endTimeUnixNano }}"
              attributes:
                {{- contains .attributes }}
                - key: http.method
                  value:
                    stringValue: GET
                - key: http.path
                  value:
                    stringValue: /api
                - key: net.host.ip
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                - key: net.peer.ip
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                - key: net.peer.port
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                {{- end }}
              events:
                - timeUnixNano: "{{ notEmpty .timeUnixNano }}"
                  name: wr
                  attributes: []
                - timeUnixNano: "{{ notEmpty .timeUnixNano }}"
                  name: ws
                  attributes: []
              status:
                code: STATUS_CODE_UNSET
            {{- end }}
        {{- end }}
    - resource:
        attributes:
          - key: service.name
            value:
              stringValue: frontend
      scopeSpans:
        {{- contains .scopeSpans }}
        - scope:
            name: zipkin-tracer
            version: "0.1.0"
          spans:
            {{- contains .spans }}
            - traceId: {{ notEmpty .traceId }}
              spanId: {{ notEmpty .spanId }}
              parentSpanId: {{ notEmpty .parentSpanId }}
              name: get
              kind: SPAN_KIND_CLIENT
              startTimeUnixNano: "{{ notEmpty .startTimeUnixNano }}"
              endTimeUnixNano: "{{ notEmpty .endTimeUnixNano }}"
              attributes:
                {{- contains .attributes }}
                - key: http.method
                  value:
                    stringValue: GET
                - key: http.path
                  value:
                    stringValue: /api
                - key: net.host.ip
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                - key: net.peer.name
                  value:
                    stringValue: backend
                - key: peer.service
                  value:
                    stringValue: backend
                - key: net.peer.ip
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                - key: net.peer.port
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                {{- end }}
              events:
                - timeUnixNano: "{{ notEmpty .timeUnixNano }}"
                  name: ws
                  attributes: []
                - timeUnixNano: "{{ notEmpty .timeUnixNano }}"
                  name: wr
                  attributes: []
              status:
                code: STATUS_CODE_UNSET
            - traceId: {{ notEmpty .traceId }}
              spanId: {{ notEmpty .spanId }}
              name: post /
              kind: SPAN_KIND_SERVER
              startTimeUnixNano: "{{ notEmpty .startTimeUnixNano }}"
              endTimeUnixNano: "{{ notEmpty .endTimeUnixNano }}"
              attributes:
                {{- contains .attributes }}
                - key: http.method
                  value:
                    stringValue: POST
                - key: http.path
                  value:
                    stringValue: /
                - key: net.host.ip
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                - key: net.peer.ip
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                - key: net.peer.port
                  value:
                    stringValue: {{ notEmpty .value.stringValue }}
                {{- end }}
              events:
                - timeUnixNano: "{{ notEmpty .timeUnixNano }}"
                  name: wr
                  attributes: []
                - timeUnixNano: "{{ notEmpty .timeUnixNano }}"
                  name: ws
                  attributes: []
              status:
                code: STATUS_CODE_UNSET
            {{- end }}
        {{- end }}
{{- end }}
