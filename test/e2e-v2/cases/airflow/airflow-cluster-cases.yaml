  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_scheduler_orphaned_tasks_cleared --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_scheduler_orphaned_tasks_adopted --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_executor_queued_tasks --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_executor_running_tasks --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_asset_orphaned --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_asset_triggered_dagruns --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: expected/metrics-has-value.yml
