# Real Airflow Celery cluster (scheduler + 2 workers + triggerer) with live OTLP metrics.
# Slower than e2e.yaml (mock sender); verifies production-like OTLP integration (26 checks).
# Full SWIP-7 metric matrix (30 checks) is in e2e.yaml (mock OTLP replay).

setup:
  env: compose
  file: docker-compose-cluster.yml
  timeout: 35m
  init-system-environment: ../../script/env
  steps:
    - name: cluster setup (tools, workload, verify env)
      command: /usr/bin/bash test/e2e-v2/cases/airflow/scripts/run-cluster-setup.sh

verify:
  retry:
    count: 60
    interval: 10s
  cases:
    - includes:
        - ./airflow-cluster-cases.yaml
