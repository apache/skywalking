# Local mock e2e overrides:
# - BanyanDB stays internal-only (avoid host port 17912 clashes with other stacks).
# - OAP loads SWIP-7 config/libs from deploy/skywalking (CI uses a dist-built image instead).

services:
  banyandb:
    ports: !reset []
  oap:
    volumes:
      - ../../../../deploy/skywalking/config:/skywalking/config:ro
      - ../../../../deploy/skywalking/oap-libs:/skywalking/oap-libs:ro
  sender:
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:9093/otel-metrics/send >/dev/null 2>&1 || curl -sf http://127.0.0.1:9093/otel-metrics/send >/dev/null"]
      interval: 5s
      timeout: 60s
      retries: 120
