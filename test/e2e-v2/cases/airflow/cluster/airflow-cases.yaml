# Real Celery cluster integration smoke (service airflow-e2e-cluster).
# Full SWIP-7 matrix: mock/airflow-cases.yaml (OTLP JSON replay).
# 2 entity-registration + 5 service + 9 instance metrics = 16 checks.
#
# Omitted vs mock (native export flaky or empty in CI cluster):
#   service — dag_file_queue_size, dagbag_size, dag_total_parse_time,
#             dag_import_errors, dag_file_refresh_error, asset_updates
#   instance — pool_deferred_slots, pool_running_slots, executor_queued_tasks,
#              asset_updates, triggers_blocked_main_thread, triggers_failed,
#              triggers_succeeded
# Details: ../README.md#coverage-split

cases:
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql service ly AIRFLOW
    expected: expected/service.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql instance ls --service-name=airflow::airflow-e2e-cluster
    expected: ../mock/expected/instance.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_scheduler_tasks_executable --service-name=airflow::airflow-e2e-cluster
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_executor_queued_tasks --service-name=airflow::airflow-e2e-cluster
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_executor_running_tasks --service-name=airflow::airflow-e2e-cluster
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_executor_open_slots --service-name=airflow::airflow-e2e-cluster
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_pool_scheduled_slots --service-name=airflow::airflow-e2e-cluster
    expected: ../mock/expected/metrics-has-value-label-poolname.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_pool_open_slots --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: ../mock/expected/metrics-has-value-label-poolname.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_pool_scheduled_slots --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: ../mock/expected/metrics-has-value-label-poolname.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_triggerer_heartbeat --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-triggerer
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_executor_running_tasks --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_scheduler_heartbeat --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_executor_open_slots --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_triggers_running --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-triggerer
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_triggerer_capacity_left --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-triggerer
    expected: ../mock/expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_airflow_instance_asset_triggered_dagruns --service-name=airflow::airflow-e2e-cluster --instance-name=airflow-scheduler
    expected: ../mock/expected/metrics-has-value.yml
