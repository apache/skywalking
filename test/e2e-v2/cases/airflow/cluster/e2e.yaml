# Real Airflow Celery cluster (scheduler + 2 workers + triggerer) with live OTLP metrics.
# Slower than mock/e2e.yaml; verifies production-like OTLP integration smoke.
# Full SWIP-7 metric matrix is in mock/e2e.yaml (OTLP JSON replay).

setup:
  env: compose
  file: docker-compose.yml
  timeout: 50m
  init-system-environment: ../../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: cluster setup (health + workload)
      command: /usr/bin/bash test/e2e-v2/cases/airflow/cluster/setup.sh

verify:
  retry:
    count: 60
    interval: 3s
  fail-fast: false
  cases:
    - includes:
        - ./airflow-cases.yaml
