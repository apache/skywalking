# Full SWIP-7 metric matrix via mock OTLP replay (27 metrics; see cluster/airflow-cases.yaml for native smoke).
# 2 entity-registration checks + 11 service + 16 instance metrics = 29 checks.

cases:
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql service ly AIRFLOW
    expected: expected/service.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql instance ls --service-name=airflow::airflow-cluster
    expected: expected/instance.yml
