errorreason: null
debuggingtrace: null
logs:
  {{- contains .logs }}
  - servicename: MyiOSApp
    serviceid: {{ notEmpty .serviceid }}
    serviceinstancename: "2.1.0"
    serviceinstanceid: {{ notEmpty .serviceinstanceid }}
    endpointname: null
    endpointid: null
    traceid: null
    timestamp: {{ gt .timestamp 0 }}
    contenttype: TEXT
    content: {{ notEmpty .content }}
    tags:
      {{- contains .tags }}
      - key: diagnosticType
        value: metrickit.diagnostic.crash
      - key: exception.type
        value: EXC_BAD_ACCESS
      - key: exception.message
        value: Could not access memory
      - key: signal.name
        value: SIGSEGV
      - key: device.model
        value: "iPhone15,2"
      - key: os.version
        value: "17.4.1"
      {{- end }}
  {{- end }}
