services:
  oap:
    extends:
      file: ../../script/docker-compose/base-compose.yml
      service: oap
    environment:
      SW_QUERY_ZIPKIN: default
      SW_RECEIVER_ZIPKIN: default
    ports:
      - "12800:12800"
      - "11800:11800"
      - "9411:9411"
    networks:
      - e2e

  banyandb:
    extends:
      file: ../../script/docker-compose/base-compose.yml
      service: banyandb
    ports:
      - 17912

  provider:
    extends:
      file: ../../script/docker-compose/base-compose.yml
      service: provider
    ports:
      - 9090
    depends_on:
      oap:
        condition: service_healthy

  provider-py:
    build:
      context: ../../script/
      dockerfile: dockerfile/Dockerfile-openai.python
    networks:
      - e2e
    ports:
      - "9091:9091"
    environment:
      OPENAI_BASE_URL: http://provider:9090/llm/otlp/v1
      OPENAI_API_KEY: xxxxxxxxxxxxxxxxxxxxxxxx
      OTEL_TRACES_EXPORTER: zipkin_json
      OTEL_EXPORTER_ZIPKIN_ENDPOINT: http://oap:9411/api/v2/spans
      OTEL_LOG_LEVEL: debug
    depends_on:
      oap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9091/"]
      interval: 5s
      timeout: 10s
      retries: 5
    command: ["opentelemetry-instrument", "python3", "/openai-call.py"]

networks:
  e2e:
