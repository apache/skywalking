# Envoy AI Gateway e2e — ai-gateway-cli + Ollama + MCP Everything Server + SkyWalking OAP
#
# Architecture:
#   LLM trigger → ai-gateway-cli (port 1975) → ollama (port 11434)
#   MCP trigger → ai-gateway-cli (port 1975) → mcp-server (port 3001)
#                       ↓ OTLP gRPC
#                  oap (port 11800) → banyandb

services:
  banyandb:
    extends:
      file: ../../script/docker-compose/base-compose.yml
      service: banyandb
    networks:
      - e2e

  oap:
    extends:
      file: ../../script/docker-compose/base-compose.yml
      service: oap
    environment:
      SW_STORAGE: banyandb
    ports:
      - 12800
    depends_on:
      banyandb:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.6.2
    networks:
      - e2e
    expose:
      - 11434
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 60s
      retries: 120

  mcp-server:
    image: tzolov/mcp-everything-server:v3
    command: ["node", "dist/index.js", "streamableHttp"]
    networks:
      - e2e
    expose:
      - 3001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Content-Type: application/json' --header='Accept: application/json, text/event-stream' --post-data='{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2025-03-26\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}}}' http://localhost:3001/mcp || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30

  aigw:
    # TODO: pin to a release version once ai-gateway-cli HTTP listener is available in a release
    image: envoyproxy/ai-gateway-cli:latest
    command:
      - "run"
      - "--run-id=0"
      - "--mcp-json"
      - '{"mcpServers":{"everything":{"type":"http","url":"http://mcp-server:3001/mcp"}}}'
    environment:
      OPENAI_API_KEY: "dummy-key-not-used"
      OPENAI_BASE_URL: "http://ollama:11434/v1"
      OTEL_SERVICE_NAME: e2e-ai-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://oap:11800
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRIC_EXPORT_INTERVAL: "5000"
      OTEL_RESOURCE_ATTRIBUTES: "job_name=envoy-ai-gateway,service.instance.id=aigw-1,service.layer=ENVOY_AI_GATEWAY"
    ports:
      - 1975
    networks:
      - e2e
    healthcheck:
      test: ["CMD", "/app", "healthcheck"]
      interval: 5s
      timeout: 60s
      retries: 120
    depends_on:
      oap:
        condition: service_healthy
      ollama:
        condition: service_healthy
      mcp-server:
        condition: service_healthy

networks:
  e2e:
