# Envoy AI Gateway e2e test (docker-compose)
#
# Validates ENVOY_AI_GATEWAY layer LLM + MCP metrics and logs via OTLP from ai-gateway-cli.
#
# Architecture:
#   LLM trigger (curl) → ai-gateway-cli (port 1975) → Ollama (port 11434)
#   MCP trigger (curl) → ai-gateway-cli (port 1975) → MCP Everything Server (port 3001)
#                              ↓ OTLP gRPC
#                         SkyWalking OAP (port 11800)
#                              ↓
#                         BanyanDB

setup:
  env: compose
  file: docker-compose.yml
  timeout: 20m
  init-system-environment: ../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: Pull Ollama model
      command: docker compose -f test/e2e-v2/cases/envoy-ai-gateway/docker-compose.yml exec ollama ollama pull qwen2.5:0.5b
    - name: Send error requests for log sampling verification
      command: |
        for i in 1 2 3; do
          curl -s --max-time 15 -o /dev/null -w "%{http_code} " \
            http://${aigw_host}:${aigw_1975}/v1/chat/completions \
            -H 'Content-Type: application/json' \
            -d '{"model":"nonexistent-model","messages":[{"role":"user","content":"Hi"}]}'
          sleep 1
        done
    - name: Send MCP requests for metric verification
      command: |
        # Initialize MCP session and capture session ID
        SESSION_ID=$(curl -sS -f -D- --max-time 15 \
          http://${aigw_host}:${aigw_1975}/mcp \
          -H 'Content-Type: application/json' \
          -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"e2e-test","version":"1.0"}}}' \
          2>&1 | grep -i '^Mcp-Session-Id:' | tr -d '\r' | sed 's/^[Mm]cp-[Ss]ession-[Ii]d: *//')
        if [ -z "$SESSION_ID" ]; then
          echo "Failed to capture MCP session ID" >&2
          exit 1
        fi
        sleep 2
        # tools/list
        curl -sS -f --max-time 15 -o /dev/null \
          http://${aigw_host}:${aigw_1975}/mcp \
          -H 'Content-Type: application/json' \
          -H "Mcp-Session-Id: $SESSION_ID" \
          -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
        sleep 1
        # tools/call — call a nonexistent tool to generate an error (no -f, expects 4xx)
        curl -sS --max-time 15 -o /dev/null \
          http://${aigw_host}:${aigw_1975}/mcp \
          -H 'Content-Type: application/json' \
          -H "Mcp-Session-Id: $SESSION_ID" \
          -d '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"nonexistent_tool","arguments":{}}}'

trigger:
  action: http
  interval: 3s
  times: 10
  url: http://${aigw_host}:${aigw_1975}/v1/chat/completions
  method: POST
  headers:
    Content-Type: application/json
  body: '{"model":"qwen2.5:0.5b","stream":true,"messages":[{"role":"user","content":"Say hi"}]}'

verify:
  retry:
    count: 30
    interval: 10s
  cases:
    - includes:
        - ./envoy-ai-gateway-cases.yaml

cleanup:
  on: always
