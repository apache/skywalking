# Envoy AI Gateway e2e verification cases
# Service name = "e2e-ai-gateway" (from OTEL_SERVICE_NAME)

cases:
  # Service exists in ENVOY_AI_GATEWAY layer
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql service ls
    expected: expected/service.yml

  # Service-level aggregate metrics
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_request_cpm --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_request_latency_avg --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_request_latency_percentile --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value-label.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_input_token_rate --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_output_token_rate --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value.yml

  # Provider breakdown
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_provider_request_cpm --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_provider_latency_avg --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value.yml

  # Model breakdown
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_model_request_cpm --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value.yml
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_envoy_ai_gw_model_latency_avg --service-name=e2e-ai-gateway
    expected: expected/metrics-has-value.yml

  # Access logs — error requests (404) should be persisted by LAL sampling
  - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql logs ls --service-name=e2e-ai-gateway
    expected: expected/logs.yml
