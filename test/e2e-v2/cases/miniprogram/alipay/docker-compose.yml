services:
  oap:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    ports:
      - 12800
    environment:
      SW_OTEL_RECEIVER: default
      SW_OTEL_RECEIVER_ENABLED_HANDLERS: "otlp-traces,otlp-metrics,otlp-logs"
      SW_OTEL_RECEIVER_ENABLED_OTEL_METRICS_RULES: "miniprogram/alipay-mini-program,miniprogram/alipay-mini-program-instance"
      SW_LOG_LAL_FILES: "miniprogram,default"
      SW_LOG_MAL_FILES: "miniprogram-alipay"
      SW_LOG_ANALYZER: default

  banyandb:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: banyandb
    ports:
      - 17912

  # Upstream SkyAPM mini-program-monitor simulator (shipped from
  # https://github.com/SkyAPM/mini-program-monitor).
  sim-alipay:
    image: ghcr.io/skyapm/mini-program-monitor/sim-alipay:v0.4.1
    depends_on:
      oap:
        condition: service_healthy
    environment:
      MODE: timed
      DURATION_MS: 60000
      SCENARIO: demo
      COLLECTOR_URL: http://oap:12800
      TRACE_COLLECTOR_URL: http://oap:12800
      SERVICE_INSTANCE: sim
    networks: [e2e]

networks:
  e2e:
