# Alipay Mini Program e2e test — drives the published
# ghcr.io/skyapm/mini-program-monitor/sim-alipay:v0.4.0 image in MODE=timed
# against OAP. Alipay emits a strict subset of metrics relative to WeChat
# (no route / script / package_load / first_paint) so this case verifies
# only the metrics Alipay actually produces.

setup:
  env: compose
  file: docker-compose.yml
  timeout: 20m
  init-system-environment: ../../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl

verify:
  retry:
    count: 20
    interval: 10s
  cases:
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql service ly ALIPAY_MINI_PROGRAM
      expected: expected/service.yml
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_alipay_mp_app_launch_duration --service-name=mini-program-sim-alipay
      expected: expected/metrics-has-value.yml
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_alipay_mp_first_render_duration --service-name=mini-program-sim-alipay
      expected: expected/metrics-has-value.yml
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_alipay_mp_request_cpm --service-name=mini-program-sim-alipay
      expected: expected/metrics-has-value.yml
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_alipay_mp_request_duration_percentile --service-name=mini-program-sim-alipay
      expected: expected/metrics-has-value-label.yml
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_alipay_mp_error_count --service-name=mini-program-sim-alipay
      expected: expected/metrics-has-value-label.yml
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=meter_alipay_mp_instance_app_launch_duration --service-name=mini-program-sim-alipay --instance-name=sim
      expected: expected/metrics-has-value.yml
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql logs list --service-name=mini-program-sim-alipay
      expected: expected/logs.yml
