services:
  oap:
    extends:
      file: ../../script/docker-compose/base-compose.yml
      service: oap
    ports:
      - "12800:12800"
      - "11800:11800"
    networks:
      - e2e

  banyandb:
    extends:
      file: ../../script/docker-compose/base-compose.yml
      service: banyandb
    ports:
      - 17912

  provider:
    extends:
      file: ../../script/docker-compose/base-compose.yml
      service: provider
    ports:
      - 9090
    depends_on:
      oap:
        condition: service_healthy

  spring-ai-examples:
    build:
      context: .
      dockerfile: Dockerfile.provider
      args:
        - SW_AGENT_JDK_VERSION=17
        - SW_AGENT_JAVA_COMMIT=${SW_AGENT_JAVA_COMMIT}
    ports:
      - "9260:8080"
    networks:
      - e2e
    environment:
      OPENAI_API_KEY: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      SPRING_AI_OPENAI_BASE_URL: http://provider:9090/llm
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: oap:11800
      SW_LOGGING_OUTPUT: CONSOLE
      SW_AGENT_NAME: e2e-spring-ai
      SW_AGENT_INSTANCE_NAME: spring-ai-examples
    healthcheck:
      test: [ "CMD", "sh", "-c", "nc -nz 127.0.0.1 8080" ]
      interval: 5s
      timeout: 60s
      retries: 120
    depends_on:
      oap:
        condition: service_healthy

networks:
  e2e:
