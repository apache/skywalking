# Exercises the ui-management REST surface end-to-end against a fresh OAP +
# BanyanDB stack. No agent traffic is needed — the test drives the admin host
# directly with `swctl admin ui-template`, walking the full template CRUD cycle.

setup:
  env: compose
  file: docker-compose.yml
  timeout: 20m
  init-system-environment: ../../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl

verify:
  # ui-management's start() waits on BanyanDB to install the ui_template
  # property schema — the REST handler can land on the admin port up to
  # ~60s after the container reports healthy. Budget for that here so
  # the first POST doesn't time out before the route is registered.
  retry:
    count: 30
    interval: 3s
  cases:
    - includes:
        - ../ui-management-cases.yaml

cleanup:
  on: always
  collect:
    on: failure
    output-dir: $SW_INFRA_E2E_LOG_DIR/banyandb-data
    items:
      - service: banyandb
        paths:
          - /tmp/measure/
          - /tmp/property/
          - /tmp/schema-property/
