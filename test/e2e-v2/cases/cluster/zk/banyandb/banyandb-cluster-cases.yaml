# BanyanDB variant of cluster-cases.yaml. Same OAP-cluster (ZooKeeper) coordination checks, but the
# meter-downsampling data is sent at RECENT timestamps instead of the shared file's fixed 2022 time:
# BanyanDB 0.11+ only serves queries within its retention window, so an old fixed time returns empty.
# Two recent, same-hour minute slots (T1, T2) are computed once and shared via a temp file; each
# downsampling query targets EXACTLY ONE slot (start == end) so the response is deterministically the
# slot the data was sent into, asserted against the exact downsampled value.
# (This file is banyandb-only; the shared cluster-cases.yaml / cluster/expected are unchanged.)
  cases:
    # verify OAP cluster is up (checks peer-forward counters, not storage). Sent ~25h ago so these
    # batches land on a different day from the downsampling data below and never pollute its sums.
    - query: |
        NOW=$(( ($(date -u +%s) - 90000) * 1000 ));
        curl -s -XPOST http://${sender1_host}:${sender1_9093}/sendBatchMetrics/$NOW/100 > /dev/null;
        curl -s -XPOST http://${sender2_host}:${sender2_9093}/sendBatchMetrics/$NOW/100 > /dev/null;
        sleep 10;
        curl -s http://${oap1_host}:${oap1_1234} | grep remote_out_count{ | awk '{print $1}'
      expected: ../../expected/cluster-up-oap1.yml
    - query: |
        NOW=$(( ($(date -u +%s) - 90000) * 1000 ));
        curl -s -XPOST http://${sender1_host}:${sender1_9093}/sendBatchMetrics/$NOW/100 > /dev/null;
        curl -s -XPOST http://${sender2_host}:${sender2_9093}/sendBatchMetrics/$NOW/100 > /dev/null;
        sleep 5;
        curl -s http://${oap2_host}:${oap2_1234} | grep remote_out_count{ | awk '{print $1}'
      expected: ../../expected/cluster-up-oap2.yml
    # compute two recent, same-hour minute slots and send the FIRST batch (2 senders x 100 = 200) at T1.
    # T1 = 5 minutes ago (truncated to the minute); the :59 guard keeps T1 and T2 in the same hour/day.
    - query: |
        T1=$(( ($(date -u +%s) - 300) / 60 * 60 ));
        [ $(( (T1 % 3600) / 60 )) -eq 59 ] && T1=$(( T1 - 60 ));
        T2=$(( T1 + 60 ));
        echo "$T1 $T2" > /tmp/banyandb_ds_slots;
        curl -s -XPOST http://${sender1_host}:${sender1_9093}/sendBatchMetrics/$(( T1 * 1000 ))/100;
        curl -s -XPOST http://${sender2_host}:${sender2_9093}/sendBatchMetrics/$(( T1 * 1000 ))/100;
        sleep 10;
      expected: ../../expected/send-metrics-rsp.yml
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql service ls
      expected: ../../expected/service.yml
    # service instance list
    - query: swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql instance list --service-name=test-service
      expected: ../../expected/service-instance.yml
    # metrics minute — one slot = T1's minute -> 200
    - query: |
        read T1 T2 < /tmp/banyandb_ds_slots;
        S=$(date -u -d @$T1 +"%Y-%m-%d %H%M" 2>/dev/null || date -u -r $T1 +"%Y-%m-%d %H%M");
        swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=test_meter_downsampling_sum --instance-name=test-instance --service-name=test-service --start "$S" --end "$S"
      expected: expected/metrics-minute-first.yml
    # metrics toHour — one slot = T1's hour -> 200
    - query: |
        read T1 T2 < /tmp/banyandb_ds_slots;
        S=$(date -u -d @$T1 +"%Y-%m-%d %H" 2>/dev/null || date -u -r $T1 +"%Y-%m-%d %H");
        swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=test_meter_downsampling_sum --instance-name=test-instance --service-name=test-service --start "$S" --end "$S"
      expected: expected/metrics-hour-first.yml
    # metrics toDay — one slot = T1's day -> 200
    - query: |
        read T1 T2 < /tmp/banyandb_ds_slots;
        S=$(date -u -d @$T1 +"%Y-%m-%d" 2>/dev/null || date -u -r $T1 +"%Y-%m-%d");
        swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=test_meter_downsampling_sum --instance-name=test-instance --service-name=test-service --start "$S" --end "$S"
      expected: expected/metrics-day-first.yml
    # send the SECOND batch (2 senders x 100 = 200) at T2 (a distinct minute in the same hour)
    - query: |
        read T1 T2 < /tmp/banyandb_ds_slots;
        curl -s -XPOST http://${sender1_host}:${sender1_9093}/sendBatchMetrics/$(( T2 * 1000 ))/100;
        curl -s -XPOST http://${sender2_host}:${sender2_9093}/sendBatchMetrics/$(( T2 * 1000 ))/100;
        sleep 10;
      expected: ../../expected/send-metrics-rsp.yml
    # metrics minute — one slot = T2's minute -> 200
    - query: |
        read T1 T2 < /tmp/banyandb_ds_slots;
        S=$(date -u -d @$T2 +"%Y-%m-%d %H%M" 2>/dev/null || date -u -r $T2 +"%Y-%m-%d %H%M");
        swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=test_meter_downsampling_sum --instance-name=test-instance --service-name=test-service --start "$S" --end "$S"
      expected: expected/metrics-minute-second.yml
    # metrics toHour — one slot = T1's hour, now sums both batches -> 400
    - query: |
        read T1 T2 < /tmp/banyandb_ds_slots;
        S=$(date -u -d @$T1 +"%Y-%m-%d %H" 2>/dev/null || date -u -r $T1 +"%Y-%m-%d %H");
        swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=test_meter_downsampling_sum --instance-name=test-instance --service-name=test-service --start "$S" --end "$S"
      expected: expected/metrics-hour-second.yml
    # metrics toDay — one slot = T1's day, both batches -> 400
    - query: |
        read T1 T2 < /tmp/banyandb_ds_slots;
        S=$(date -u -d @$T1 +"%Y-%m-%d" 2>/dev/null || date -u -r $T1 +"%Y-%m-%d");
        swctl --display yaml --base-url=http://${oap_host}:${oap_12800}/graphql metrics exec --expression=test_meter_downsampling_sum --instance-name=test-instance --service-name=test-service --start "$S" --end "$S"
      expected: expected/metrics-day-second.yml
