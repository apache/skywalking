services:
  zk:
    image: zookeeper:3.9
    expose:
      - 2181
    networks:
      - e2e
    healthcheck:
      test: [ "CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/2181" ]
      interval: 5s
      timeout: 60s
      retries: 120

  banyandb:
    extends:
      file: ../../../../script/docker-compose/base-compose.yml
      service: banyandb

  oap1:
    extends:
      file: ../../../../script/docker-compose/base-compose.yml
      service: oap
    volumes:
      - ../../test-downsampling.yaml:/skywalking/config/meter-analyzer-config/test-downsampling.yaml
    environment:
      SW_CLUSTER: zookeeper
      SW_STORAGE: banyandb
      SW_CORE_PERSISTENT_PERIOD: 5
      SW_METER_ANALYZER_ACTIVE_FILES: test-downsampling
      SW_CLUSTER_ZK_HOST_PORT: zk:2181
      SW_CLUSTER_INTERNAL_COM_HOST: oap1
      SW_CLUSTER_INTERNAL_COM_PORT: 11800
      SW_CORE_DATA_KEEPER_EXECUTE_PERIOD: 100
      SW_TELEMETRY: prometheus
      TESTING_TTL: "true"
    ports:
      - 1234
    depends_on:
      zk:
        condition: service_healthy
      banyandb:
        condition: service_healthy

  oap2:
    extends:
      file: ../../../../script/docker-compose/base-compose.yml
      service: oap
    volumes:
      - ../../test-downsampling.yaml:/skywalking/config/meter-analyzer-config/test-downsampling.yaml
    environment:
      SW_CLUSTER: zookeeper
      SW_STORAGE: banyandb
      SW_CORE_PERSISTENT_PERIOD: 5
      SW_METER_ANALYZER_ACTIVE_FILES: test-downsampling
      SW_CLUSTER_ZK_HOST_PORT: zk:2181
      SW_CLUSTER_INTERNAL_COM_HOST: oap2
      SW_CLUSTER_INTERNAL_COM_PORT: 11800
      SW_CORE_DATA_KEEPER_EXECUTE_PERIOD: 100
      SW_TELEMETRY: prometheus
      TESTING_TTL: "true"
    ports:
      - 1234
    depends_on:
      zk:
        condition: service_healthy
      banyandb:
        condition: service_healthy
      oap1:
        condition: service_healthy

  # TCP LB on 12800 so tests address the clustered OAP through a single
  # `${oap_host}:${oap_12800}` regardless of which member answers.
  # Use `ports:` (not `expose:`) so infra-e2e can read the host-side
  # mapping and populate `${oap_host}` / `${oap_12800}`.
  oap:
    image: nginx:${SW_NGINX_VERSION}
    networks:
      - e2e
    ports:
      - 12800
    volumes:
      - ../../../../script/docker-compose/oap-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      oap1:
        condition: service_healthy
      oap2:
        condition: service_healthy

  sender1:
    image: "eclipse-temurin:8-jre"
    volumes:
      - ../../../../java-test-service/e2e-mock-sender/target/e2e-mock-sender-2.0.0.jar:/e2e-mock-sender-2.0.0.jar
    command: [ "java", "-jar", "/e2e-mock-sender-2.0.0.jar" ]
    environment:
      OAP_HOST: oap1
      OAP_GRPC_PORT: 11800
    networks:
      - e2e
    ports:
      - 9093
    healthcheck:
      test: [ "CMD", "sh", "-c", "nc -nz 127.0.0.1 9093" ]
      interval: 5s
      timeout: 60s
      retries: 120
    depends_on:
      oap1:
        condition: service_healthy
      oap2:
        condition: service_healthy

  sender2:
    image: "eclipse-temurin:8-jre"
    volumes:
      - ../../../../java-test-service/e2e-mock-sender/target/e2e-mock-sender-2.0.0.jar:/e2e-mock-sender-2.0.0.jar
    command: [ "java", "-jar", "/e2e-mock-sender-2.0.0.jar" ]
    environment:
      OAP_HOST: oap2
      OAP_GRPC_PORT: 11800
    networks:
      - e2e
    ports:
      - 9093
    healthcheck:
      test: [ "CMD", "sh", "-c", "nc -nz 127.0.0.1 9093" ]
      interval: 5s
      timeout: 60s
      retries: 120
    depends_on:
      oap1:
        condition: service_healthy
      oap2:
        condition: service_healthy
networks:
  e2e:
