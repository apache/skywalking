# Runtime-rule lifecycle e2e — BanyanDB variant.
#
# Boots OAP with empty static otel-rules + lal so the runtime-rule apply path
# exercises first-time DDL on BanyanDB. The python OTLP emitter pushes a
# counter (e2e_rr_request_count_total) and gauge (e2e_rr_pool_size) tagged
# with a per-phase `step` label that the flow script flips between phases;
# the runtime-rule HTTP handler accepts seed rules that derive SkyWalking
# metrics from those signals; the flow script drives the full lifecycle —
# CREATE → UPDATE-FILTER → UPDATE-STRUCTURAL → DUMP → ILLEGAL × 4 →
# SHAPE-BREAK → INACTIVATE → ACTIVATE → DELETE → DUMP — and asserts each
# phase against /list, swctl, the BanyanDB-side measure existence, and the
# step-label-attributed query results.

setup:
  env: compose
  file: docker-compose.yml
  timeout: 25m
  init-system-environment: ../../../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: install jq
      command: |
        if ! command -v jq >/dev/null 2>&1; then
          curl -fsSL -o /tmp/skywalking-infra-e2e/bin/jq \
            https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
          chmod +x /tmp/skywalking-infra-e2e/bin/jq
        fi
    - name: drive runtime-rule lifecycle
      command: |
        set -euo pipefail
        export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
        export OAP_HOST=127.0.0.1
        export OAP_REST_PORT=17128
        export OAP_GQL_PORT=12800
        export SEED_RULES_DIR=$(pwd)/test/e2e-v2/cases/runtime-rule/mal-storage/seed-rules
        bash test/e2e-v2/cases/runtime-rule/mal-storage/runtime-rule-flow.sh

verify:
  retry:
    count: 1
    interval: 1s
  cases:
    # The flow script above drives every assertion inline; verify.cases is kept
    # minimal so the harness reports the script's pass/fail directly. A trailing
    # /list smoke check confirms the receiver port is still serving after the
    # destructive phase (catches regressions where /delete crashes the handler).
    - query: curl -fsS http://127.0.0.1:17128/runtime/rule/list >/dev/null && echo ok
      expected: expected/ok.txt

cleanup:
  on: always
  collect:
    on: failure
    output-dir: $SW_INFRA_E2E_LOG_DIR/runtime-rule/mal-storage-banyandb
    items:
      - service: banyandb
        paths:
          - /tmp/banyandb-stream-data/
          - /tmp/banyand-measure-data/
      - service: oap
        paths:
          - /skywalking/logs/
