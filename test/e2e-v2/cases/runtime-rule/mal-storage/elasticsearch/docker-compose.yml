services:
  es:
    image: elastic/elasticsearch:${ES_VERSION}
    networks:
      - e2e
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - cluster.routing.allocation.disk.threshold_enabled=false
      - xpack.security.enabled=false
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/9200"]
      interval: 5s
      timeout: 60s
      retries: 120

  oap:
    extends:
      file: ../../../../script/docker-compose/base-compose.yml
      service: oap
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: es:9200
      SW_RECEIVER_RUNTIME_RULE: default
      # Tighten the persistence timer for the e2e: every 10s (default 25s) so the
      # lifecycle flow's per-phase awaits land sooner.
      SW_CORE_PERSISTENT_PERIOD: "10"
      # Static rule catalogs stay at their defaults — the e2e_rr_-prefixed metric name
      # the runtime-rule lifecycle uses doesn't collide with anything static. ES default
      # logicSharding=false means all metrics merge into a single metrics-all index;
      # CREATE still exercises a first-time register for our specific metric even
      # though the index may already exist for other static metrics.
    ports:
      - "11800:11800"
      - "12800:12800"
      - "17128:17128"
    depends_on:
      es:
        condition: service_healthy
    networks:
      - e2e

  otlp-emitter:
    build:
      context: ../otlp-emitter
    networks:
      - e2e
    environment:
      OTLP_ENDPOINT: http://oap:11800
      EMITTER_SERVICE: e2e-rr-svc
      EMITTER_INSTANCE: e2e-rr-i1
      # The lifecycle flow rewrites this file via `docker compose exec`
      # between phases so each emitted sample carries the current phase's
      # `step` label.
      STEP_FILE: /tmp/step
      STEP_DEFAULT: create
    depends_on:
      oap:
        condition: service_healthy

networks:
  e2e:
