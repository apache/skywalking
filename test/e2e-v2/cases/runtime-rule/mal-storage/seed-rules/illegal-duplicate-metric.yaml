# ILLEGAL: a sibling rule that claims the same metric name (`requests`)
# the structural rule already owns. The lifecycle e2e ILLEGAL-APPLY phase
# posts this under a *different* `name` query parameter so the cross-file
# ownership guard fires, and expects HTTP 409 with a body that names the
# colliding owner.
metricPrefix: e2e_rr
expSuffix: service(['service_name'], Layer.GENERAL)
metricsRules:
  - name: requests
    exp: e2e_rr_request_count_total.sum(['service_name', 'step'])
