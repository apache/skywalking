# ILLEGAL: malformed YAML — used by the lifecycle e2e ILLEGAL-APPLY phase
# to assert the runtime-rule REST handler returns 400 compile_failed
# without mutating /list or backend storage. The MAL parser rejects the
# unquoted `*** broken ***` token before any registration runs.
metricPrefix: e2e_rr
expSuffix: service(['service_name'], Layer.GENERAL)
metricsRules:
  - name: requests
    exp: *** broken ***
