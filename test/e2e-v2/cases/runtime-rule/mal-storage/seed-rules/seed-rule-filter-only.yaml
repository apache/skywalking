# FILTER_ONLY update of seed-rule.yaml.
# Same metric name, same shape (still service-scope sum), expression body
# scaled by 10 so post-update bucket values jump by an order of magnitude
# and the e2e can confirm the swap took effect without backend DDL.
metricPrefix: e2e_rr
expSuffix: service(['service_name'], Layer.GENERAL)
metricsRules:
  - name: requests
    exp: (e2e_rr_request_count_total * 10).sum(['service_name', 'step'])
