# v1 — initial CREATE rule for the runtime-rule lifecycle e2e.
# Derives one SkyWalking metric (e2e_rr_requests) from the OTLP counter
# emitted by the otlp-emitter container, keyed by service + step so each
# lifecycle phase's samples land on a distinct row the verify queries can
# attribute back to the phase that wrote them.
# Verifies first-time DDL on each backend — boots without any static
# otel-rules / lal so the runtime-rule apply path is the one that
# creates the underlying measure / table / index.
metricPrefix: e2e_rr
expSuffix: service(['service_name'], Layer.GENERAL)
metricsRules:
  - name: requests
    exp: e2e_rr_request_count_total.sum(['service_name', 'step'])
