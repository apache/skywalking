# ILLEGAL: same-name shape break (SERVICE → SERVICE_INSTANCE scope) posted
# WITHOUT `?allowStorageChange=true`. The lifecycle e2e ILLEGAL-APPLY
# phase posts this against the structural rule already on the OAP and
# expects HTTP 409 storage_change_requires_explicit_approval.
metricPrefix: e2e_rr
expSuffix: instance(['service_name'], ['service_instance_id'], Layer.GENERAL)
metricsRules:
  - name: requests
    exp: e2e_rr_request_count_total.sum(['service_name', 'service_instance_id', 'step'])
