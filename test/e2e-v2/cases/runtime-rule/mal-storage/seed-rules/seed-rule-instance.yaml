# v4 — shape-break variant. Same metric name (`requests`), but the scope
# changes from SERVICE to SERVICE_INSTANCE, which is a same-name shape
# break that the runtime-rule guardrail refuses unless the operator
# explicitly approves. Posted via the SHAPE-BREAK phase after a
# /inactivate + /delete cycle (the supported route through the API),
# and again via the ACTIVATE phase to prove the soft-pause window
# preserves history while the new shape is reapplied.
metricPrefix: e2e_rr
expSuffix: instance(['service_name'], ['service_instance_id'], Layer.GENERAL)
metricsRules:
  - name: requests
    exp: e2e_rr_request_count_total.sum(['service_name', 'service_instance_id', 'step'])
