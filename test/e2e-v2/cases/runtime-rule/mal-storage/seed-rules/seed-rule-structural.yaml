# STRUCTURAL update of seed-rule-filter-only.yaml.
# Adds a second metric (e2e_rr_pool) derived from the gauge — STRUCTURAL
# because the metric set changes. Each backend's CreatingListener fires
# again; the e2e asserts the new measure / table / index lands and the
# new metric is queryable. The pre-existing e2e_rr_requests metric stays
# under its scaled expression.
metricPrefix: e2e_rr
expSuffix: service(['service_name'], Layer.GENERAL)
metricsRules:
  - name: requests
    exp: (e2e_rr_request_count_total * 10).sum(['service_name', 'step'])
  - name: pool
    exp: e2e_rr_pool_size.sum(['service_name', 'step'])
