# Cluster convergence — 2 OAPs behind a ZooKeeper coordinator + BanyanDB.
# Verifies that a runtime-rule apply on one node propagates to the other within a
# reconciler tick (default 30 s) and that the Suspend / Resume RPC bracket dispatch
# correctly across the cluster.
services:
  zookeeper:
    image: zookeeper:3.8
    networks:
      - e2e
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,stat,srvr"
    healthcheck:
      # Use the zookeeper-shell.sh ls wrapper (image's own /bin) — the official
      # zookeeper:3.8 image does not ship `nc`, so the more obvious `echo ruok | nc ...`
      # idiom fails. zkServer.sh status returns 0 once the server is in standalone /
      # leader mode.
      test: ["CMD-SHELL", "zkServer.sh status 2>/dev/null | grep -E 'Mode: (standalone|leader|follower)'"]
      interval: 5s
      timeout: 10s
      retries: 30

  banyandb:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: banyandb

  oap1:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    hostname: oap1
    environment:
      SW_RECEIVER_RUNTIME_RULE: default
      SW_STORAGE: banyandb
      SW_CLUSTER: zookeeper
      SW_CLUSTER_ZK_HOST_PORT: zookeeper:2181
      # First-up node also doubles as the static-rule installer; nothing to coordinate
      # with peers on storage init.
    ports:
      - "11800:11800"
      - "12800:12800"
      - "17128:17128"
    depends_on:
      zookeeper:
        condition: service_healthy
      banyandb:
        condition: service_healthy
    networks:
      - e2e

  oap2:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    hostname: oap2
    environment:
      SW_RECEIVER_RUNTIME_RULE: default
      SW_STORAGE: banyandb
      SW_CLUSTER: zookeeper
      SW_CLUSTER_ZK_HOST_PORT: zookeeper:2181
    ports:
      - "11801:11800"
      - "12801:12800"
      - "17129:17128"
    depends_on:
      zookeeper:
        condition: service_healthy
      banyandb:
        condition: service_healthy
      oap1:
        condition: service_healthy
    networks:
      - e2e

networks:
  e2e:
