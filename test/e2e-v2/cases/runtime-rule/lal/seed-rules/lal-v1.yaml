# LAL v1 — extracts one meter sample per matching log under metric name
# `e2e_lal_log_count` and stamps it with `step=v1`. The companion log-mal
# rule (seed-rules/log-mal.yaml) aggregates this counter; swctl asserts the
# aggregated value carries step=v1 once data lands. Swapping to v2 (same
# rule key, different `step` literal) proves the hot-update actually changed
# the running extraction — the new step value shows up in queries.
rules:
  - name: e2e-rr-lal-live
    layer: GENERAL
    dsl: |
      filter {
        text {
          regexp $/.*e2e_rr_lal_live.*/$
        }
        extractor {
          metrics {
            timestamp log.timestamp as Long
            labels service: log.service, service_instance_id: log.serviceInstance, step: 'v1'
            name 'e2e_lal_log_count'
            value 1
          }
        }
        sink {
        }
      }
