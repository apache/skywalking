# LAL v2 — same rule key as v1, same metric name `e2e_lal_log_count`, but the
# `step` label is now 'v2'. Successful hot-swap shows up as the aggregated
# metric beginning to publish step=v2 samples after the apply lands; swctl
# queries for step=v2 only become non-empty post-swap, proving the running
# extraction switched bodies (not just the persisted rule row).
rules:
  - name: e2e-rr-lal-live
    layer: GENERAL
    dsl: |
      filter {
        text {
          regexp $/.*e2e_rr_lal_live.*/$
        }
        extractor {
          metrics {
            timestamp log.timestamp as Long
            labels service: log.service, service_instance_id: log.serviceInstance, step: 'v2'
            name 'e2e_lal_log_count'
            value 1
          }
        }
        sink {
        }
      }
