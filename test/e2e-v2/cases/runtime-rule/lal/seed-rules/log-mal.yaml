# Log-MAL aggregation for the LAL extractor's emitted counter. The LAL rule
# (lal-v1 / lal-v2) attaches a `step` label whose value flips on hot-swap;
# this MAL rule retains `step` in the grouping so swctl can filter by phase.
# The flow applies this rule (catalog=log-mal-rules, name=e2e_lal) before
# any LAL apply so the aggregation pipeline is ready by the time samples
# start flowing.
metricPrefix: meter_e2e_lal
expSuffix: service(['service'], Layer.GENERAL)
metricsRules:
  - name: log_count
    exp: e2e_lal_log_count.sum(['service','service_instance_id','step'])
