# LAL hot-update with end-to-end MAL extraction proof — applies a log-mal
# aggregation rule via runtime-rule, then hot-swaps a LAL extractor rule
# whose extractor stamps a per-version `step` label so swctl can verify the
# swap actually changed the running extraction.

setup:
  env: compose
  file: docker-compose.yml
  timeout: 25m
  init-system-environment: ../../../script/env
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: install jq
      command: |
        if ! command -v jq >/dev/null 2>&1; then
          curl -fsSL -o /tmp/skywalking-infra-e2e/bin/jq \
            https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
          chmod +x /tmp/skywalking-infra-e2e/bin/jq
        fi
    - name: drive LAL hot-update flow
      command: |
        set -euo pipefail
        export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
        export OAP_HOST=127.0.0.1
        export OAP_REST_PORT=17128
        export OAP_GQL_PORT=12800
        export SEED_DIR=$(pwd)/test/e2e-v2/cases/runtime-rule/lal/seed-rules
        bash test/e2e-v2/cases/runtime-rule/lal/lal-flow.sh

verify:
  retry:
    count: 1
    interval: 1s
  cases:
    - query: curl -fsS http://127.0.0.1:17128/runtime/rule/list >/dev/null && echo ok
      expected: expected/ok.txt

cleanup:
  on: always
  collect:
    on: failure
    output-dir: $SW_INFRA_E2E_LOG_DIR/runtime-rule/lal
    items:
      - service: oap
        paths:
          - /skywalking/logs/
