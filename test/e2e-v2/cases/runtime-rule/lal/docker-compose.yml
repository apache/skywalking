# LAL live-swap — single OAP + BanyanDB + an OTLP log emitter. The flow applies
# a LAL rule (v1), swaps it for v2 with the same (layer, ruleName) key, then
# inactivates and deletes. The log emitter pushes one log every second so the
# LAL filter pipeline has actual data to match across the swap window — failures
# in the per-file classloader retirement / Factory.addOrReplace path show up as
# stalled or duplicated dispatch (caught by the next-tick /list assertions).
services:
  oap:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    environment:
      SW_RECEIVER_RUNTIME_RULE: default
      SW_STORAGE: banyandb
      # Open the OTLP gRPC log receiver on the standard port (11800) — base-compose
      # already opens 11800; we just need the log handler to be on.
      SW_OTEL_LOG_RECEIVER: default
    ports:
      - "11800:11800"
      - "12800:12800"
      - "17128:17128"
    networks:
      - e2e

  banyandb:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: banyandb

  log-emitter:
    build:
      context: ./log-emitter
    networks:
      - e2e
    environment:
      OTLP_ENDPOINT: http://oap:11800
      EMITTER_SERVICE: e2e-rr-lal-svc
      EMITTER_INSTANCE: e2e-rr-lal-i1
      EMITTER_INTERVAL_S: "1"
    depends_on:
      oap:
        condition: service_healthy

networks:
  e2e:
