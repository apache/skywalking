# queryAlarms ruleNames=[service_resp_time_rule] — every returned
# alarm's name must be a service that fired this specific rule. The rule
# fires per-service so msgs[*].name is a service name; we just assert
# non-empty (any service name is acceptable, but the list must be
# non-empty because the alarm rule fires in the e2e baseline).
msgs:
  {{- contains .msgs }}
  - name: {{ notEmpty .name }}
  {{- end }}
