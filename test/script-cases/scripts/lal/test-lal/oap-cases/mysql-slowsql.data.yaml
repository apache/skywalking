# Mock input data for mysql-slowsql.yaml rules.

mysql-slowsql:
  body-type: json
  body: '{"layer":"MYSQL","service":"mysql::test-db","time":"1609459200000","id":"slow-001","statement":"SELECT * FROM users WHERE name LIKE \"%test%\"","query_time":3000}'
  tags:
    LOG_KIND: SLOW_SQL
  expect:
    save: true
    abort: false
    layer: MYSQL
    service: mysql::test-db
    timestamp: "1609459200000"
    outputField.id: slow-001
    outputField.statement: "SELECT * FROM users WHERE name LIKE \"%test%\""
    outputField.latency: 3000
