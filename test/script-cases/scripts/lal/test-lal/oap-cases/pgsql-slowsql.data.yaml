# Mock input data for pgsql-slowsql.yaml rules.

pgsql-slowsql:
  body-type: json
  body: '{"layer":"POSTGRESQL","service":"pgsql::test-db","time":"1609459200000","id":"slow-002","statement":"SELECT * FROM orders WHERE created_at > now() - interval 1 day","query_time":5000}'
  tags:
    LOG_KIND: SLOW_SQL
  expect:
    save: true
    abort: false
    layer: POSTGRESQL
    service: pgsql::test-db
    timestamp: "1609459200000"
    outputField.id: slow-002
    outputField.statement: "SELECT * FROM orders WHERE created_at > now() - interval 1 day"
    outputField.latency: 5000
