# Mock input data for envoy-als.yaml rules.
# The envoy-als rule processes protobuf HTTPAccessLogEntry as extraLog,
# not JSON body. The proto-json is parsed via protobuf JsonFormat.

envoy-als:
  - service: test-mesh-svc
    body-type: none
    extra-log:
      proto-class: io.envoyproxy.envoy.data.accesslog.v3.HTTPAccessLogEntry
      proto-json: '{"response":{"responseCode":500},"commonProperties":{"upstreamCluster":"outbound|80||backend.default.svc"}}'
    expect:
      tag.status.code: "500"
      save: true
      abort: false

  - service: test-mesh-svc-abort
    body-type: none
    extra-log:
      proto-class: io.envoyproxy.envoy.data.accesslog.v3.HTTPAccessLogEntry
      proto-json: '{"response":{"responseCode":200},"commonProperties":{"upstreamCluster":"outbound|80||backend.default.svc"}}'
    expect:
      save: true
      abort: true

  - service: test-mesh-svc-with-flags
    body-type: none
    extra-log:
      proto-class: io.envoyproxy.envoy.data.accesslog.v3.HTTPAccessLogEntry
      proto-json: '{"response":{"responseCode":200},"commonProperties":{"upstreamCluster":"outbound|80||backend.default.svc","responseFlags":{"upstreamConnectionFailure":true}}}'
    expect:
      save: true
      abort: false
      tag.response.flag: "upstream_connection_failure: true\n"

network-profiling-slow-trace:
  body-type: json
  body: '{"latency":800,"uri":"/mesh/api","reason":"SLOW","service":"envoy-mesh-svc","serviceInstance":"envoy-inst-1","client_process":{"process_id":"proc-c1","local":false,"address":"10.0.0.5:8080"},"server_process":{"process_id":"","local":true,"address":""},"detect_point":"SERVER","component":"http","ssl":false}'
  tags:
    LOG_KIND: NET_PROFILING_SAMPLED_TRACE
  expect:
    save: true
    abort: false
    outputField.latency: 800
    outputField.uri: /mesh/api
    outputField.reason: SLOW
    outputField.processId: proc-c1
    outputField.detectPoint: SERVER
    outputField.componentId: 49
