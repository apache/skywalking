input:
  apisix_nginx_http_current_connections:
    - labels:
        route: test-route
        node: test-node
        state: active
      value: 100.0
  apisix_http_requests_total:
    - labels:
        route: test-route
        node: test-node
        service_instance_id: test-inst
      value: 100.0
  apisix_bandwidth:
    # matched: non-empty route and node
    - labels:
        route: test-route
        node: test-node
        type: ingress
      value: 100.0
    # unmatched: empty route and node (for tagEqual('route','','node',''))
    - labels:
        route: ''
        node: ''
        type: ingress
      value: 50.0
  apisix_http_status:
    # matched
    - labels:
        route: test-route
        node: test-node
        code: '200'
      value: 100.0
    # unmatched
    - labels:
        route: ''
        node: ''
        code: '200'
      value: 50.0
  apisix_http_latency:
    # matched histogram buckets (non-empty route and node)
    - labels: {route: test-route, node: test-node, type: request, le: '50'}
      value: 10.0
    - labels: {route: test-route, node: test-node, type: request, le: '100'}
      value: 20.0
    - labels: {route: test-route, node: test-node, type: request, le: '250'}
      value: 30.0
    - labels: {route: test-route, node: test-node, type: request, le: '500'}
      value: 40.0
    - labels: {route: test-route, node: test-node, type: request, le: '1000'}
      value: 50.0
    # unmatched histogram buckets (empty route and node)
    - labels: {route: '', node: '', type: request, le: '50'}
      value: 5.0
    - labels: {route: '', node: '', type: request, le: '100'}
      value: 10.0
    - labels: {route: '', node: '', type: request, le: '250'}
      value: 15.0
    - labels: {route: '', node: '', type: request, le: '500'}
      value: 20.0
    - labels: {route: '', node: '', type: request, le: '1000'}
      value: 25.0
  apisix_shared_dict_capacity_bytes:
    - labels:
        route: test-route
        node: test-node
      value: 100.0
  apisix_shared_dict_free_space_bytes:
    - labels:
        route: test-route
        node: test-node
      value: 100.0
  apisix_etcd_modify_indexes:
    - labels:
        route: test-route
        node: test-node
      value: 100.0
  apisix_etcd_reachable:
    - labels:
        route: test-route
        node: test-node
      value: 100.0
