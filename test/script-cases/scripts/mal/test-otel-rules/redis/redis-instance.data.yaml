input:
  redis_uptime_in_seconds:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_connected_clients:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_memory_max_bytes:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_memory_used_bytes:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_commands_total:
    - labels:
        cmd: get
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_keyspace_hits_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_keyspace_misses_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_net_input_bytes_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_net_output_bytes_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_db_keys:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_expired_keys_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_evicted_keys_total:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_blocked_clients:
    - labels:
        host_name: test-host
        service_instance_id: test-instance
      value: 100.0
  redis_commands_duration_seconds_total:
    - labels:
        host_name: test-host
        cmd: get
        service_instance_id: test-instance
      value: 100.0
expected:
  instance_uptime:
    min_samples: 1
  instance_connected_clients:
    min_samples: 1
  instance_memory_max_bytes:
    min_samples: 1
  instance_memory_usage:
    min_samples: 1
  instance_total_commands_rate:
    min_samples: 1
  instance_hit_rate:
    min_samples: 1
  instance_net_input_bytes_total:
    min_samples: 1
  instance_net_output_bytes_total:
    min_samples: 1
  instance_db_keys:
    min_samples: 1
  instance_expired_keys_total:
    min_samples: 1
  instance_evicted_keys_total:
    min_samples: 1
  instance_redis_blocked_clients:
    min_samples: 1
  instance_average_time_spent_by_command:
    min_samples: 1
  instance_commands_duration_seconds_total_rate:
    min_samples: 1
